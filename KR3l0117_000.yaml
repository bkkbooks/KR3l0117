body:
  text: 襄國張師正纂第一卷宋州狂僧黑殺神降來和天尊樂學士司馬待制後苑亭衡山僧南嶽真人會聖宫曹門謡陳靖醴泉觀賈魏公大名監掃㒒射􅈦吕椻密第二卷盛樞密余尚書郎侍郎劉密學劉待制楊省副魏侍郎司馬少卿梁學士張郎中韓侍中張職方陳少卿楊狀元郭延卿第三卷馬少保潘郎中樂大卿徐郎中劉太博刁左藏吕郎中錢齋郎邢文濟蒿店巡檢王廷評樊預第四卷陳省副王待制石比部曹郎中陸龍圗宋中舍馬文思陳大博馬仲載夏著冀祕丞梁寺丞楊郎中張大慱楊從先第五卷李參政梅侍讀韓宗緒南州壬子李侍禁李氏婢李比部胡殿丞謝判官劉觀察宅柴氏枯棗僧緣新第六卷王少保范參政麥道録楊道人李芝張白靜長官率子廉許偏頭張翰第七卷張龍圗孫副樞芙蓉觀主曽屯田郭上竈牛用之畢道人假榖方道士高閬孫鍇楊貫張酒酒第八卷明參政徐學士魚中丞祖龍圗尚寺丞髙舜臣王慶孫翰林黃遵劉德妙稅道士寇萊公魏進士德州民第九卷毛郎中崔禹臣張郎中張司封薛比部陳良弼羅著作陸長孺寇侍禁張尚書薑定國傅文秀胡郎中僧行悅康定民鄭前陳州女厲第十卷鍾離發運蔡侍禁白鬚翁韓元卿李敏樂平港鼉遵道者董中正同州村民括異志目録建寧府麻沙鎮虞叔異宅刋行虞山逸民俞約齋收藏
  hash: sha256:b68a9d3f99ea8e148f82592dced22caf4bbd923d2e4524e1ddfc60adc43b6664
