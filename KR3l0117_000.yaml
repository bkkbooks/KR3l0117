body:
  text: 襄國張師正纂第一卷宋州狂僧黒殺神降来和天尊樂學士司馬待制後苑亭衡山僧南岳眞人㑹聖宫曹門謡陳靖醴泉觀賈魏公大名監埽㒒射􅈦吕椻宻第二卷盛樞宻余尚書郎侍郎劉宻學劉待制楊省副魏侍郎司馬少卿梁學士張郎中韓侍中張軄方陳少卿楊状元郭延卿第三卷馬少保潘郎中樂大卿徐郎中劉太愽刁左蔵吕郎中錢齋郎邢文濟蒿店廵檢王廷評樊預第四卷陳省副王待制石比部曹郎中陸龍圗宋中舍馬文思陳大愽馬仲載夏着冀秘丞梁寺丞楊郎中張大慱楊從先第五卷李叅政梅侍讀韓宗緒南州壬子李侍禁李氏婢李比部胡殿丞謝判官劉觀察宅柴氏枯棗僧縁新第六卷王少保范叅政麥道録楊道人李芝張白静長官率子㢘許偏頭張翰第七卷張龍圗孫副樞芙蓉觀主曽屯田郭上竈牛用之畢道人叚榖方道士高閬孫鍇楊貫張酒酒第八卷明叅政徐學士魚中丞祖龍圗尚寺丞髙舜臣王慶孫翰林黄遵劉徳妙稅道士㓂莱公魏進士徳州民第九卷毛郎中崔禹臣張郎中張司封薛比部陳良弼羅着作陸長孺㓂侍禁張尚書姜定國傅文秀胡郎中僧行悅康定民鄭前陳州女厲第十卷鍾離發運蔡侍禁白鬚翁韓元卿李敏樂平港鼍遵道者董中正同州村民括異志目錄建寜府麻沙鎮虞叔異宅刋行虞山逸民俞約齋收蔵
