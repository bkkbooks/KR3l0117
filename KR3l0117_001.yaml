front:
  text: 括異志卷苐一
  hash: sha256:8210ee8d6152df9f4d22424320bd1fbb75af1fa1c02cdba4e6549bf38d829c2e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0117_SBCK_001-1a}
body:
  text: 襄國張師正纂宋州狂僧太祖仕周日尚未領宋州節鉞時有狂僧携彈走荆棘中顧謂人曰此地當出天子又顯德末一人青巾白衫登中書政事堂吏批其頰曰汝是何人敢至此其人曰宋州官家遣我來擒見宰相范質質曰此病心耳安足問遂叱去其後太祖果自歸德軍節度使受禪遂升宋州為應天府後號南郡一名南郡事具國史黑殺神降開寶中有神降於鳳翔府俚民張守真事自稱玄天大聖玉帝輔臣其聲嬰兒歷歷可辨逺近之民禱祠者旁午太祖召至京師設醮於宫廷降語曰天上宫闕成玉鎖開十月二十日陛下當歸天藝祖􅈤祈曰死固不憚所恨者幽并未并乞延三數年俟克復二州去亦未晚神曰晉王有仁心曆數攸屬陛下在天亦自有位時太宗王晋為開封尹太祖命繫於左軍將無驗而罪焉既而事符神告太宗踐祚度守真為道士仍賜紫𫀆遂營廟於盩厔之太平鎮神位次序殿廡規模一由神授仍尊黑殺號為翊聖至仁宗朝追諡守真為傳真大法師事見翊聖别傳來和天尊刑部尚書楊公礪為貟外郎時常夢人引導云謁來和天尊及見天尊年甚少睟穆之姿若冰玉焉楊公伏謁天尊慰藉之甚厚及覺莫諭其事後章聖皇帝育德儲闈尹正神州楊公入幕始謁而歸語諸子弟曰吾適謁皇太子乃吾頃夢來和天尊之儀狀也事在礪本傳樂學士樂學士史景德末為西都留臺御史嘗夢一人具冠服稱帝命來召共行十餘里俄見宫闕壯麗殆非人世因向使者云此帝所也既陛見帝謂曰而主求嗣吾為擇之汝姑伺此少選導一人至氣色和粹似醺酣狀帝謂曰中原求嗣汝往勿辭即頓首祈免者再三帝曰往哉惟汝宜遂唯而去旁拱者謂史曰此南嶽赤腳李仙人也嘗酣于酒帝急呼史至前曰適見者主之嗣也寤而識之既而密以聞具述所夢曰宫中不久有甲觀之慶明年神文誕聖安退處士劉易嘗記斯事司馬待制故天章閣待制司馬公池乾興中以職官知光山縣秩滿考績于吏部時章聖臨御一夕夢引對于便殿仰視黼座狀甚幼冲即覺竊語交親以謂改官之期方逺銓司既質成課將取旨㑹真宗不豫神文以皇太子監國引見資善堂仰視睿姿一如所夢事見龐相國所撰司馬公神道碑後苑亭嘉祐末仁宗于後苑建一亭題其榜曰迎曙亭未幾神文棄天下英宗嗣位則亭之名豈徒然哉昔漢昭帝時上林柳葉蟲蠧成字曰公孫病已立霍光既廢昌邑立戾太子之孫是為宣帝實名病己唐宣宗晚年長安小兒疊布蘸氷向日捩之謂之拔暈懿宗果自鄆王嗣立以今方古事實符契古語有云翰鵲噪而行人至火花燃而得酒食此言雖小可以喻大况王者之興豈無開先之兆也異哉衡山僧嘉祐八年三月衡山縣僧某來湘潭幹事既畢歸衡山至中途宿逆旅忽夢行道中車騎戈甲旌麾儀衛去地丈餘躡空北去僧伏道左少時既過復前又逢數騎叱之曰安得犯蹕僧自疏得免因問何官也曰新天子即位南嶽神往受職耳僧既覺明日至衡山白所夢於邑令令戒僧曰祕之勿妄言後數日聞仁宗遺詔至考其所夢之夕正月二十九日也金匱云武王勝殷紂大雪平地盈尺旦日有車馬詣軍門行無轍迹太公曰此四海之神洎河北一本作伯來受職也因祀之約束而去與此正類李時亮云南嶽真人龐相國籍既致政居於京師嘉祐八年春三月公𬒳疾至下旬病革一旦奄然家人聚哭數刻復生翌日命紙筆屏左右手書密封俾其子奏家人咸謂久病恍惚書字不謹遂寢不以聞公既薨發視之云𥘉死有人引導令朝玉皇入一大殿庭排班龐處下列拜訖有一人傳玉皇詔云龐某令且歸伺與南嶽真人偕來既出殿門又有人前導云當見南嶽真人復至一殿庭列班龐居上游卷簾畢既拜熟視乃仁宗皇帝也時神文久不豫龐既復蘇覺體候小康又聞聖躬亦復常膳乃竊喜故欲上聞三月二十七日龐薨越一日仁廟上仙進士時濟得之于興教院主僧惠節會聖宫㑹聖宫在洛都東八十里望仙橋祖宗之神御在焉嘉祐八年三月二十九日晝漏盡宫側之人見王者羽衛陳布道中最後二人衣赭𫀆張黃蓋乘馬相次至宫前乃不見明日宫門大敞諸殿門鎖不鑰而啓主事者大駭少時聞仁廟上仙曹門謡天聖末洎明道中京師市井坊巷之人凡物之美嘉者即曰曺門好物之高大者即曰曺門高耆壯童稚無不道者景祐𥘉神文詔册曹王女孫為皇后曹王為國功臣之冠雖圭爵蟬聮者三世洎作配宸極居外戚之尊可謂高且好矣王輔藝祖定天下降蜀平吳抗醜虜破強敵將百萬之衆未嘗妄殺一人宜乎後裔之興也唐郭尚父功蓋天下位極人臣侈窮人欲夀登耆艾天謂報施之道由或歉然至曖女為憲宗元妃歷七朝五居母后之尊人君行子孫之禮唐史臣謂子儀社稷之功未泯復鍾慶於懿安焉以曹氏之餘烈近之矣陳靖陳靖字唐臣巨野人少倜儻有氣節通詩易嘗從范諷石延年劉潜游景祐五年以進士特奏名得三禮出身荐為邑佐皆有䏻聲稍遷孝感令以公事忤郡太守輒致所事而去即日僦舟東下隱於葉山未幾詔下以太子中舍致仕值歲荒徙家京師賣藥自給朝之公卿多故人踵門者輒避去或遺金帛即散道士丐者未嘗有所畜與其妻孔氏皆學辟榖往往經歲不食嘉祐四年思武陵山水之嘉盡室出彼王介甫高其行以詩送有知君欲上武陵溪水自東流人自西之句既至武陵結廬于髙梧市居數月喪其妻自是不接人事杜門稱疾惟焚香誦易而已六年七月十七日亭午遽命其子庠具紙札作書遺張郎中顒曰近上帝以靖平生無諂俾主判地下平直司候天符下即之任矣張時職江東漕運得書以靖為病心者不復報是日又躬為一書封緘甚密戒其子曰張公歸鄉以此書授之不可示他人及私發違吾言汝為不孝其子謹藏之自是多為歌詩皆有脫去世俗之意七年十一月十二日平旦謂其子曰吾數盡矣後事一託張祕丞主之言訖而終時張祕丞顒將赴官益陽前一日與靖别翌日得其訃亟為辦喪事葬于耆闍山之側治平元年七月張仲孚自江東還其子庠捧父書號泣來獻封緘如𥘉發之其始末皆叙訣之辭中乃云平直司必然失為議定皇嗣事勿怪草草明年秋英宗由大宗正為皇子而靖于六年七月為以書已有選定之語由是知帝王之興皆受命于天默有符契非偶然矣此皆略取張仲舉學士所撰陳靖傳云醴泉觀祥符中京師東南隅醴泉涌龜蛇見其側飲之者疾瘳即其地營祥源觀其後灾再加繕搆改號醴泉觀熙寧八年又易傾朽荐加堊飾功畢落成命教坊伶人奏樂于庭是日真武影現於殿脊火珠中其部從神官旗纛之類望之悉具京師奔走觀矚者數千萬人見陳虞部幵云賈魏公賈魏公昌朝先德名注嘗為棣州推官公方在孕一夕夢緋衣冠者一人自空而下以巨箱捧貂蟬冠以獻俄而公生始數歲先令公為瀛幕公時在膝下契丹數十萬攻圍踰月城甚危守陴者聞空中神告曰城有中朝輔相勿憂賊也數日虜遁去城卒無患公自宰相出鎮擁節鉞者垂二十年官至兼侍中若然則貴賤之分淹速之數固由默定世之汲汲於進者無所不至豈昧於居易之理乎大名監掃河自大坯而下多泛溢之患岸有缺圯則以薪芻窒塞𥙷薄增卑謂之掃岸每一二十里則命使臣巡視凡一掃岸必有薪茭竹捷樁木之類數十百萬以備决溢使臣始受命皆軍令約束熙寧九年大名府元城縣一監掃使臣所主掃岸有大黿屢來嚙岸之薪芻似將穴焉遂彀弩射之中首而死是夜夢一緑衣創首謂監掃曰汝殺我我已訴於官矣又月餘病疽死見二使者執之而去曰汝嘗殺人監掃竊思之曰此必殺黿事也行僅百里入一城使者曰吾有事當先白所由司汝姑止此無他適二使既去仰視高閣金碧相照有二神人守􅕡如道士觀所謂龍虎君者以姓名白之乃引入仰視其閣有榜題曰朝元之閣下見韓待中稚圭憑几而坐侍者數十人若神仙儀衛乃再拜訖韓問來狀遂白煞黿事因曰隄岸有决當受軍令之責非徒殺也韓曰汝亦何罪儻見隂官但乞檢上清格即出門見二使者至遂引到一官府庭下果詰以殺黿事對曰某主掃岸河流奔猛漲溢不常苟有决漏則當誅黿敗吾防不可不殺乞檢上清格隂官取格視訖謂曰上清格云無益于世有害于人殺而不償罪固難加隂官命前使者引出行十餘里若墮眢井遂寤事聞之于劉大卿襲禮云㒒射􅈦陳英公執中𥘉以左正言謫為中允監永州酒稅郡守常以諌官待之間日具肴膳就其所治以延欵之英公即座周視居宇忽於榱桷楣間注目久之顧侍吏曰見一牌否左右對以無覩郡守而下皆曰未嘗有牌陳笑而雜以他語及歸家人怪而詢之公曰宛見一金字牌書㒒射􅈦字公由是益自負既而兩正台府竟踐此位雖以司徒致政然在仕之時官為端揆進士魏泰呼英公為舅祖得聞其事吕樞密吕樞密公弼丞相申公之次子始秦國妊娠而疾將去之命醫工陳孫煮藥時方𥘉夜逮藥將熟己二鼓坐而假寐忽然鼎覆取諸藥品差銼末再煮之俄以嚴鼓不覺再覆既而又煮而加火焉困甚就榻夢一神人披黃金甲持劒叱陳曰在胞者本朝宰相也汝何等人敢以毒藥加害陳恐栗而寤遂以所夢洎覆鼎事白於秦國曰在孕者貴人也雖疾當無所損其後生寶臣熙寧中自樞密使出鎮而薨聞之馬瑊運判云括異志卷苐一
