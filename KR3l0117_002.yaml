front:
  text: 括異志卷苐二
  hash: sha256:70874a0357d76dbf2064d1d547c7a43f29665faf4d1733abc6f2f0cebd4da40a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0117_SBCK_002-1a}
body:
  text: 襄國張師正纂盛樞密樞密使文肅盛公度修起居注日嘗感疾而死支體猶溫故家人未敢殮越宿乃蘇云始為人追攝若行田野間氣候昏塞如𣣔雨狀良久入一府見主者𬒳古諸侯服起而接公且諗以同姓名而誤追亟命公還既而復行田間逺望有數人皆若舊識及追視之乃故相國沈公義倫也喜揖盛曰審知學士得還為我語家人頗為汗腳襪所苦草草别去盛神還疾亦漸愈遂以冥中所囑語沈孤其孤泣而不悟汙腳襪之説及服除徹相公靈榻而神座之橫桄有敗襪焉究其所自則守靈老卒之物偶致于此旦起忘之謂已亡失故不復索文肅公説余尚書余尚書靖韶州曲江人天聖元年苐進士又中拔萃始自曲江將求薦于天府與一同郡進士劉某偕行劉已四預計偕行至洲頭驛有祠頗靈余謂劉曰與足下萬里圗身計盍乞靈焉遂率劉以楮鏹香酒禱祠下乞夢中示以休咎是夕余夢神告召而謂曰公祿甚厚貯于數廩官至尚書死于秦亭劉某窮薄止有祿六斗耳公謝而退遂寤其後出入清華聲望赫然中罹廢黜者纍歲其後竟至工部尚書常語交親曰關中任使決不敢去既罷廣州至烏江得疾遂入金陵就醫艤舟秦淮扶病登亭視其榜曰秦淮亭公不懌數日而薨劉某者以纍舉不苐就南遷遂攝一尉才逾旬而卒李供備時亮云郎侍郎郎侍郎簡致政之年將赴闕更圗一郡然後懸車途次奔牛宿于堰下時盛暑月色澄亮命從者皆寢闢船門默坐乙夜聞岸側有人語云吾兒明日過此幸若曹悉力曳船渠齒幼恐致驚怖郎大訝登岸四顧人皆酣寢惟群牛卧于屋下翌日郎駐舟以伺俄有稱監簿者年甫弱冠由途於此船既及堰群牛不待呵捶旋轉如風頃刻而過堰郎太息曰吾平生歷官治民自謂無冤抑安能垂老更僶丨俯於王事乎即抗章告老南歸餘杭牛之子不傳名氏者郎為之諱也陳節推之方筆以相示劉密學天禧中劉密學師道守潭州有衡山民之長沙市易者冒夜而行道中見旌旗儀衛呵導甚厲民相與拱立道左因詢前驅者曰何處大官曰潭州劉密學授南嶽北門侍郎明日禮上是夜復有內臣冮供奉者來嶽廟燒香宿廟下夢供帳紛紜言新官禮上洎見乃劉密學也又馬尚書亮時尹京南午己之問有一道士至客次展謁謂曰侍郎已下􅈦不敢通刺道士曰無他事欲投潭州劉密學書耳典謁曰既要相見何不早來又曰為今日南嶽北門侍郎上事畢方來以故後時言訖失道士所在晚衙馬視事典謁以告馬大驚以為不祥數日凶訃至考道士求見之辰劉捐館之日也先是劉在長沙一旦稱受劄子赴闕即具舟艦立俾徙行李族厲于舟中又曰吾未交符印今日且宿寺居明日洗沐訖穿膝坐正寢儼然而逝今衡潭之人嚴奉之禮與嶽神等或聞祖舍人士衡有傳今所書者録馬運判瑊辛都官子言之説耳劉待制待制劉公湜彭城人清修檢重時所推與自金陵尹移守高密時已抱疾乘船沿淮至水車驛舍遂卒先是驛居人見驅群羊及負荷酒食橫陳之具入驛者視之則無人如此纍日劉既卒始悟鬼神之來迓水車溝在海密州界得之周都官之純言楊省副楊省副日華自言應舉日與數同人稅宅於飲馬巷居數月無他異一日探榜歸時春季頗暄相與解帶席地而坐俄覺身之欹側者再三以謂地動問諸僕隸則不知楊取剔耳箆畫甓罅中罥出淺紅線長數寸以手牽之有縑衣如線色隨牽而長約尺餘懼而捨之其下若有人引之者徐徐盡入坐者大駭莫敢發視即時遷于旅邸余任渭州推官日親承楊公之説魏侍郎邢部侍郎魏公􅗕𥘉以金部貟外郎知洪州罷官舟經大孤山方乘順風楊舲甚駃一女使滌器而墜水援之不及舟速浪沸頃刻己十里餘公惋歎良久一女奴忽沉冥狂語趨前而舉止語音皆所溺婢也泣且言曰某不幸而溺於水實命之至是無所恨然服勤左右久矣一旦不以理而終夫豈不大戚耶儻歲時月朔賜草具饌化楮泉于户外使某得以歆領雖泉下亦不忘報公與夫人聞之惻然悉允其求語次一漁艇載所溺婢棹及公舟告曰溺婢為浪泊而出獲援之以送婢固醒然未嘗死而女奴亦不復降語得之都官郎中任粹云司馬少卿太常少卿司馬公里自言未冠時侍仲父待制光山縣門下客張某者亦年少同舍肄業常苦資用不足張忽嘆曰碩得乾汞法以快吾欲旁有黥卒執汛掃之役者笑曰秀才年少安知世間有此事耶張曰神仙之術不可妄求豈不知之乎卒曰某嘗得此術碩試之張大喜脫衣質錢市汞及炭𥘉夜以水銀一兩內鼎中出小瓢取藥一粒如芥子投之又以小瓦覆鼎口泥封甚密熾炭圍之急扇良久鼎中如風聲傾之成白金矣翌日召金工視之曰此汞銀也比聞有黥卒得此術間或鬻之豈非此人所為乎張亦祕而不言張謂司馬曰斯人而有斯術也圖之固易然緩而取之善也自此屢以美言撫存之一日請浣衣於江濵去遂不復竟不知所適梁學士梁狀元固慱逹俊偉人也未仕室職于史館數年而卒未克斂慿侍姬玉兒者降靈語云吾今棄世才信宿家事不治乃爾又召子弟戒敕曰吾家素貧尚有鉛器數十事兼朝廷必有贈賜足辦喪事不得倚四郎中其叔父也但託祖舍人可也家人問曰學士今居何所云見作隂山諌議寄任不輕又索毫楮作啓令子弟取某書還某家於某家取所借某書還者收取者得復索茶合飲一杯已手自封牌真梁之迹也須臾乃去姬如醉醒詰之殊不自知進士洪正卿云張郎中張郎中景晟洛陽人也去華侍郎之孫登進士第始逾強仕為屯田郎中熙寧四年奉朝請于京師忽瘍生于手痛不可忍時有銜醫仇鼎者專治創痏呼視之遂取少藥傅其上既而苦楚尤甚仇雖復注以善藥而痛不能巳數日而卒沉困之際但云仇鼎殺我必訴於隂府不汝致也月餘仇坐藥肆中見二人一衣緋一衣緑入鼎家手持符檄謂鼎曰張郎中有狀相訟可往對事仇曰張郎中病疽而死何預我事緋衣曰奉命相逮不知其他仇知不免哀求延數日之命二人相顧曰延三日可矣緋衣曰雖然當記之而去遂出一印印其膝下遂不見所印之處即腫潰創中所出如膏油痛若火灼後三日而死始仇之知張槖實良厚欵𣣔先以毒藥潰其創然後加良藥愈之以邀重賂遂至不救鬼之來獨鼎具之左右但見紛紜號欣而已噫庸醫之視疾多以藥返其病使困而後治欲取厚謝因而致斃者衆矣儻盡若張君之顯報則小人之心庶幾乎革矣韓侍中侍中韓公稚圭知泰州日卧疾數日冥冥無所知倐然而蘇語左右曰適夢以手捧天者再不覺驚悟其後援英宗於藩邸翼神宗於春宫捧天之祥已兆於慶曆中固知賢臣之􅈴業非偶然而致也太常博士姚復云張職方張職方太寧宿州人家冨于財登進士第性惡鴟每至官必下令左右挾彈逐之熙寧六年丁內艱權居於符離之佛寺嘗有鴟巢於殿之魚尾育二雛羽翼漸成飛躍于外嗚嘯不已張親彈之中丸而斃既而二大鴟盤空鳴聲甚悲翌日張步庭中一鴟下摶其巾方驚駭一鴟復來攫傷其鬢創亦不甚旬餘潰決腐及喉遂死嗟乎哀子之死仁也報子之仇義也孰謂禽獸無仁義之心乎父子之道天性也處萬物之靈親愛之心宜其甚焉熙寧甲寅乙卯歲天下蝗旱至父子相啖者真禽獸之不若也悲夫陳少卿太常少卿陳公希亮曩歲刺宿州􅈦事後門常扃鑰相傳云開則有怪云本字見陳剛方明決不之信遽命啓之果有群妖晝夜隱見于房闥間陳亦不甚懼一日偶至土地堂見土偶數十疑其為妖命碎之投諸汴水妖遂絶蓋每歲立春出土牛牛既為衆所分裂衙卒乃取䇿牛人置于土地之祠也張供備宗義言楊狀元前進士黃通與狀元楊公置相善嘗夢楊投刺自稱龍首山人慶曆𥘉既登苐丁內艱未終喪而卒其後好事者解之曰龍首謂狀元登苐也山人無祿之稱也郭延卿郭延卿洛陽人少以文行稱於鄉里吕公蒙正張公齊賢未苐時皆以師友事之太平興國中陳摶自華州𬒳召摶素以知人名天下及道西洛三人者皆進謁搏倒履迎之目吕曰先輩當狀元及苐位至宰相張先輩科名雖在行間而福祿延永又過於吕然殊不言延卿于是二人相與言曰郭君文行鄉里所推幸與一目摶曰固知之然亦甚好遂草草别去摶送之門顧張吕二君今晚更過訪及期往搏曰二君前程某固已言然所惜延卿祿薄伺吕君作相始合得一命張君作相當得職官耳既而吕果狀元中苐及為相薦延卿得試校書郎及張作相益念郭之潦倒一夕語其子宗誨曰為我作奏劄子薦郭延卿京官及翌日造朝遽索奏劄宗誨草奏悮書京字為職字及書可降制乃職官皆如摶言也進士魏泰聞之陸修撰經云其始末甚詳括異志卷苐二
