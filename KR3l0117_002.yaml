front:
  text: 括異志卷苐二
  hash: sha256:70874a0357d76dbf2064d1d547c7a43f29665faf4d1733abc6f2f0cebd4da40a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0117_SBCK_002-1a}
body:
  text: 㐮國張師正纂盛樞宻樞宻使文肅盛公度修起居注日嘗感疾而死支體猶温故家人未敢殮越宿乃蘇云始為人追攝若行田野間氣候昬塞如𣣔雨状良乆入一府見主者𬒳古諸侯服起而接公且諗以同姓名而誤追亟命公還旣而復行田間逺望有數人皆若舊識及追視之乃故相國沈公義倫也喜揖盛曰審知學士得還為我語家人頗為汗脚襪所苦草草别去盛神還疾亦漸愈遂以冥中所嘱語沈孤其孤泣而不悟汙脚襪之說及服除徹相公靈榻而神座之横桄有敗襪焉究其所自則守靈老卒之物偶致于此旦起忘之謂已亡失故不復索文粛公說余尚書余尚書靖韶州曲江人天聖元年苐進士又中㧞萃始自曲江将求薦于天府與一同郡進士劉某偕行劉已四預計偕行至洲頭驛有祠頗靈余謂劉曰與足下萬里圗身計盍乞靈焉遂率劉以楮鏹香酒禱祠下乞夢中示以休咎是夕余夢神告召而謂曰公禄甚厚貯扵數廩官至尚書死于秦亭劉某窮薄止有禄六斗耳公謝而退遂寤其後出入清華聲望赫然中罹廢黜者累歳其後竟至工部尚書常語交親曰關中任使决不敢去旣罷廣州至烏江得疾遂入金陵就醫艤舟秦淮扶病登亭視其榜曰秦淮亭公不懌數日而薨劉某者以累舉不苐就南遷遂攝一尉才逾旬而卒李供備時亮云郎侍郎郎侍郎簡致政之年将赴闕更圗一郡然後懸車途次奔牛宿于堰下時盛暑月色澄亮命從者皆寝闢船門黙坐乙夜聞岸側有人語云吾児明日過此幸若曹悉力曳船渠齒㓜恐致驚怖郎大訝登岸四顧人皆酣寑惟群牛卧于屋下翌日郎駐舟以伺俄有稱監簿者年甫弱冠由途於此船旣及堰群牛不待呵捶旋轉如風頃刻而過堰郎太息曰吾平生歴官治民自謂無冤抑安能垂老更僶丨俛於王事乎即抗章告老南歸餘杭牛之子不傳名氏者郎為之諱也陳節推之方筆以相示劉宻學天禧中劉宻學師道守潭州有衡山民之長沙市易者冐夜而行道中見旌旗儀衛呵導甚厲民相與拱立道左因詢前駈者曰何䖏大官曰潭州劉宻學授南岳北門侍郎明日禮上是夜復有内臣冮供奉者来岳廟燒香宿廟下夢供帳紛紜言新官禮上洎見乃劉宻學也又馬尚書亮時尹京南午己之問有一道士至客次展謁謂曰侍郎已下􅈦不敢通刺道士曰無他事欲投潭州劉宻學書耳典謁曰旣要相見何不早来又曰爲今日南岳北門侍郎上事畢方来以故後時言訖失道士所在晚衙馬視事典謁以告馬大驚以為不祥數日㓙訃至考道士求見之辰劉捐舘之日也先是劉在長沙一旦稱受劄子赴闕即具舟艦立俾徙行李族厲于舟中又曰吾未交符印今日且宿寺居明日洗沐訖穿膝坐正寝儼然而逝今衡潭之人嚴奉之禮與岳神䓁或聞祖舍人士衡有傳今所書者錄馬運判瑊辛都官子言之說耳劉待制待制劉公湜彭城人清修檢重時所推與自金陵尹移守高宻時已抱疾乗船㳂淮至水車驛舍遂卒先是驛居人見駈群羊及負荷酒食横陳之具入驛者視之則無人如此累日劉旣卒始悟鬼神之来迓水車溝在海宻州界得之周都官之純言楊省副楊省副日華自言應舉日與數同人稅宅於飲馬巷居數月無他異一日探榜歸時春季頗暄相與解帶席地而坐俄覺身之欹側者再三以謂地動問諸僕隸則不知楊取剔耳箆畫甓罅中罥出淺紅線長數寸以手牽之有縑衣如線色隨牽而長約尺餘懼而捨之其下若有人引之者徐徐盡入坐者大駭莫敢發視即時遷扵旅邸余任渭州推官日親承楊公之說魏侍郎邢部侍郎魏公􅗕𥘉以金部貟外郎知洪州罷官舟經大孤山方乗順風楊舲甚駃一女使滌噐而墜水援之不及舟速浪沸頃刻己十里餘公惋歎良乆一女奴忽沉冥狂語趋前而舉止語音皆所溺婢也泣且言曰某不幸而溺於水實命之至是無所恨然服勤左右乆矣一旦不以理而終夫豈不大戚耶儻歳時月朔賜草具饌化楮泉于户外使某得以歆領雖泉下亦不忘報公與夫人聞之惻然悉允其求語次一漁艇載所溺婢櫂及公舟告曰溺婢爲浪泊而出獲援之以送婢固醒然未嘗死而女奴亦不復降語得之都官郎中任粹云司馬少卿太常少卿司馬公里自言未冠時侍仲父待制光山縣門下客張某者亦年少同舍肄業常苦資用不足張忽嘆曰碩得乾汞法以快吾欲旁有黥卒執汛掃之役者笑曰秀才年少安知世間有此事耶張曰神仙之術不可妄求豈不知之乎卒曰某嘗得此術碩試之張大喜脱衣質錢市汞及炭𥘉夜以水銀一兩内鼎中出小瓢取藥一粒如芥子投之又以小瓦覆鼎口泥封甚宻熾炭圍之急扇良乆鼎中如風聲傾之成白金矣翌日召金工視之曰此汞銀也比聞有黥卒得此術間或鬻之豈非此人所為乎張亦秘而不言張謂司馬曰斯人而有斯術也圖之固易然緩而取之善也自此屢以美言撫存之一日請浣衣於江濵去遂不復竟不知所適梁學士梁状元固慱逹俊偉人也未仕室職于史館數年而卒未克歛慿侍姬玉兒者降靈語云吾今棄世纔信宿家事不治乃爾又召子弟戒敕曰吾家素貧尚有鉛噐數十事兼朝廷必有贈賜足辦䘮事不得倚四郎中其叔父也但託祖舍人可也家人問曰學士今居何所云見作隂山諌議寄任不輕又索毫楮作啓令子弟取某書還某家於某家取所借某書還者收取者得復索茶合飲一盃已手自封牌真梁之蹟也須臾乃去姬如醉醒詰之殊不自知進士洪正卿云張郎中張郎中景晟洛陽人也去華侍郎之孫登進士第始逾強仕爲屯田郎中熈寜四年奉朝請于京師忽瘍生于手痛不可忍時有衘醫仇鼎者專治創痏呼視之遂取少藥傅其上旣而苦楚尤甚仇雖復注以善藥而痛不䏻巳數日而卒沉困之際但云仇鼎殺我必訴於隂府不汝致也月餘仇坐藥肆中見二人一衣緋一衣緑入鼎家手持符檄謂鼎曰張郎中有状相訟可徃對事仇曰張郎中病疽而死何預我亊緋衣曰奉命相逮不知其他仇知不免哀求延數日之命二人相顧曰延三日可矣緋衣曰雖然當記之而去遂出一印印其膝下遂不見所印之䖏即腫潰創中所出如膏油痛若火灼後三日而死始仇之知張槖實良厚欵𣣔先以毒薬潰其創然後加良藥愈之以邀重賂遂至不救鬼之来獨鼎具之左右但見紛紜號訢而已噫庸醫之視疾多以藥返其病使困而後治欲取厚謝因而致斃者衆矣儻盡若張君之顯報則小人之心庻幾乎革矣韓侍中侍中韓公稚珪知泰州日卧疾數日冥冥無所知倐然而甦語左右曰適夢以手捧天者再不覺驚悟其後援英宗於藩邸翼神宗於春宫捧天之祥已兆於慶曆中固知賢臣之􅈴業非偶然而致也太常愽士姚復云張軄方張軄方太寜宿州人家冨于財登進士第性悪鴟每至官必下令左右挾弹逐之熈寜六年丁内艱權居於符離之佛寺嘗有鴟巢於殿之魚尾育二雛羽翼漸成飛躍于外嗚嘯不已張親弹之中丸而斃旣而二大鴟盤空鳴聲甚悲翌日張歩庭中一鴟下摶其巾方驚駭一鴟復来攫傷其髩創亦不甚旬餘潰决腐及喉遂死嗟乎哀子之死仁也報子之仇義也孰謂禽獸無仁義之心乎父子之道天性也䖏萬物之靈親愛之心宜其甚焉熈寜甲寅乙卯歳天下蝗旱至父子相啖者眞禽獸之不若也悲夫陳少卿太常少卿陳公希亮曩歳刺宿州􅈦事後門常扃鑰相傳云開則有怪云本字見陳剛方明决不之信遽命啓之果有群妖晝夜隱見于房闥間陳亦不甚懼一日偶至土地堂見土偶數十疑其為妖命碎之投諸汴水妖遂絶盖每歳立春出土牛牛旣為衆所分裂衙卒乃取䇿牛人置于土地之祠也張供備宗義言楊状元前進士黄通與状元楊公寘相善嘗夢楊投刺自稱龍首山人慶暦𥘉旣登苐丁内艱未終䘮而卒其後好事者觧之曰龍首謂状元登苐也山人無禄之稱也郭延卿郭延卿洛陽人少以文行稱於郷里吕公蒙正張公齊賢未苐時皆以師友事之太平興國中陳摶自華州𬒳召摶素以知人名天下及道西洛三人者皆進謁搏倒履迎之目吕曰先軰當狀元及苐位至宰相張先軰科名雖在行間而福禄延永又過於吕然殊不言延卿扵是二人相與言曰郭君文行郷里所推幸與一目摶曰固知之然亦甚好遂草草别去摶送之門顧張吕二君今晚更過訪及期徃搏曰二君前程某固已言然所惜延卿禄薄伺吕君作相始合得一命張君作相當得職官耳旣而吕果状元中苐及為相薦延卿得試校書郎及張作相益念郭之潦倒一夕語其子宗誨曰為我作奏劄子薦郭延卿京官及翌日造朝遽索奏劄宗誨草奏悮書京字為職字及書可降制乃職官皆如摶言也進士魏泰聞之陸脩撰經云其始末甚詳括異志卷苐二
