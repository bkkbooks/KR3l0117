front:
  text: 括異志卷苐三
  hash: sha256:7436f378d8c2a0bda6c65f3d24ebc6d300cf2a2889f2e98361d89a7eb2f8500f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0117_SBCK_003-1a}
body:
  text: 襄國張師正纂馬少保太子少保馬公亮自言少肄業于廬州城外佛寺一夕臨窗燭下閲書有大手如扇自窗伸於公前若有所索公不為視閲書如故如是比夜而至公因語人有道士云素聞鬼畏雄黃可試以辟之公乃研雄黃漬水密置按上是夕大手又至公遽以茟濡雄黃大書一草字書畢聞窗外大呼曰速為我滌去不然禍及與汝公雅不為聽停燭而寢有頃怒甚而索滌愈急公不應逮曉更哀鳴而不能縮且曰公將大貴我且不為他怪徒以相戲而犯公何忍遽致我于極地耶我固得罪而幽冥之狀由公以彰暴于世亦非公之利也公獨不見溫嶠􅛚犀照牛渚之事乎公大悟即以水滌去草字且戒他日勿復擾人怪遜謝而去進士魏泰言馬公嘗説於其祖云潘郎中潘郎中繼宗清河人以明經發第有吏材天聖中自國子博士通判乾寧軍其母亡以十餘歲一日於堂前呼家人令召其子容狀衣服宛如平昔潘再拜號哭母急止之曰可於堂西偏隔以帟幕前下一簾中安二榻吾將與伴我者二婦人息焉既而語云吾死亦無大過隂官但致我一室中不令他適汝既升朝封我為縣太君隂官乃縱我出入汝前歲知導江縣我嘗至彼相視以水晶柱斧倒置植扉後吾亦未有生期恐久溷汝聊以為識也今我往生兾州北門內街西磨坊某人媳婦處為女因得來此家人日夕具飲食惟聞匕箸聲視之如故留月餘告去舉家送之郊外空中有哭泣聲久而不聞潘既受代道出信都詢之皆如所説潘後常以緡帛遺其家潘之子士龍今為正郎胡訥嘗著孝行録亦記潘夫人事樂火卿光祿卿樂公滋性沉厚少年修學時嘗就祖母寢榻前燈下看書一夕二鼓後燈檠搖動如人携持周行室中復止故處樂亦不懼明日言于門下客客不之信是夜取檠置學舍中明燈而坐才二鼓復行如𥘉客大呼而走遂命斧碎亦無他異徐郎中徐郎中萊州人忘其名弱冠侍父假守嶺外乾興中仁宗登極部賀禮赴闕至武陵一驛將舍正寢驛卒言其中有物怪往來無敢居者碩易他次雖不以為然亦出寢於􅈦之屏後夜將半夢有神人狀甚偉手携竹籃其中皆人鼻也叱汝何等人敢輒居此以妨吾路徐恐懼愧謝神乃端視之曰形相非薄但其鼻曲而小吾與若易之遂於籃中擇一鼻先劓徐鼻擲去以所擇鼻安之仍以手指周固四際夢中亦覺痛楚神笑曰好一正郎鼻也徐之鼻素不隆正自夢易之後自然端直歷官駕部郎中致仕隨其子祕書丞朔在維揚簽判治平四年物故劉太博興州依山為守居層疊而上正寢尤髙復搆樓於上俯視儀門如指掌寶元中太常博士劉公中逹假守是郡一日與家人登樓見白衣者入客次若舉人狀劉遽曰有客至吾將延之遂下樓升􅈦果有舉人投刺劉接之坐移刻各不語告去遂循東廡而下左右告曰當自西廡舉人不答直趨東廡井次投身而入劉大駭遽索井中無所得而亦不能究舉人者自何而來月餘劉卒前進士程覺言刁左藏刁左藏允升嘗提舉大名府左廂馬監在職歲餘卒其家先寓於大名朝城縣熙寧二年秋刁捐館半歲次子總忽見父坐于城門之側行李從者無異平昔惟從人悉衣白方驚懼其父以手招之即詣前拜且哭刁遽止之總問曰大人今主何事刁曰吾嘗事范希文渠今主隂府俾我提舉行疫者今欲往許州以南巡按道出此故暫來視汝因曰汝母明年八月當死但預為備勿告之恐渠憂撓孫某來年五月亦當卒此皆冥籍先定汝冝自寬孫乃總之愛子也又曰市中仇某不半歲必刑死因懷中取鴉青紙一幅有金書七十餘字授總曰善保持勿失墜遂上馬呵道出南門而去閭卷悉見行數里逢市人張五者避立路左刁謂之曰我欲倩君可乎張曰諾乃謂曰若暫到我家語吾兒後月南市當災且慎之我已留從者五人防視必免焚如張亦不知是鬼也遂詣刁宅欲逹其語聞宅中大哭少選總出詢方知刁久已棄世其妻洎孫如期而死邑中官吏知有火災日夕戒居人儲水謹火禁月餘火自空屋發與刁居密邇四鄰悉焚惟刁宅獨完仇某者聞當刑死杜門不出一日與客奕碁于所居之門下有誦佛書而丐者仇屢謝之不去語頗不遜仇忘刁之言毆之即死竟斃于枯木金書人皆不識之字書亦無事聞之借職刁綽言吕郎中吕郎中元規治平𥘉為廣南東路提點刑獄公宇在韶州宅堂之後有園亭亭下植荔枝數㧣夏五月實盡丹翌日將召賔僚開樽以賞之其亭暮則扃鐍人迹所不至詰旦啓户無一實在枝但見殼核盈地於板壁題詩一絶云我曹今日會家親手把洪鍾飲數巡滿地狼籍不知曉荔枝還是一畨新歲餘吕以事去官其姪子邈言錢齋郎治平中有錢齋郎者調于吏部挈其妻居京師一日其妻𬒳夫之衣冠語言皆男子也狀如病心召符禁者視之術皆不效聞孔監丞者有道術能已人疾苦遂詣其居告以妻之所為孔許至其居翌曰乃來與錢偶坐其妻冠幘束帶往來于左右詈曰汝是何人預我家事久之孔都不與語俄而獨曰莫須著去否孔因謂曰汝本何人輒慿人之室家可乎乃曰我嘗𬒳一命而死亦曽舉進士頗探釋老書昨到京師無處寓止暫慿附于此人孔曰既若曽涉獵三教是識理之人也汝在世仕宦之日汝之室肯令他人慿之乎鬼默然又謂曰汝既言曽探釋老有爾許大虛空何所不容而言無寓止之所言訖錢妻瞢然而倒半日乃寤詢其前事皆不知也得之張稚圭言邢文濟華隂縣雲臺觀道士邢文濟常掌華隂道司事故得紫其服號虛寂大師既免道職專主金天南祠鄉人歲時獻施金帛甚夥邢悉裒為私藏間充酒色之費有巡檢某人者知其事密令人喻旨邢屢以所得賂之一夕邢夢人攝至金天殿下見巡檢亦在廷中有若胥吏者詰二人以盜用神物皆服罪各鞭背十二遣歸邢既寤覺背間楚痛遂詣巡檢話昨日之夢驚曰我夢亦然月餘邢病背瘡死巡檢者亦患疽相繼而殂得之董職方經臣録蒿店巡檢渭州蒿店有巡檢𪠘宇率命班行領卒數百戍焉慶曆中羌人入寇巡檢張殿直者應援于外其家悉為蕃賊所俘虜既入賊境骨肉皆為賞口其妻分肄一畨酋俾主汲煬之役每荷汲器至水次必南望大慟而後歸其家一犬亦攘掠而得者常隨妻出入屢㗸其衣􅊯􅊯而吠搖尾前行十數步回顧又鳴如此者半歲妻因泣謂犬曰汝能導我歸漢耶犬即躍鳴妻乃計曰住此而生不若逃而死萬一或得逹漢計遂決俟夜隨犬南馳天將曉犬必擇草木岑蔚之處令妻跧伏犬即登髙阜顧望意若探候者時捕雉兔銜致妻前得以充飢凡旬日逹漢境巡邏者以聞訪其夫尚在乃好合如故自此朝暮所食必分三器一以飼犬斯事番人具知之評曰犬六畜也惟豢養之戀既陷夷狄之域尚由思漢又能導俘虜之婦間關而歸可謂獸貌而人心也有𬒳衣冠而叛父母之國者斯犬之罪人也王廷評王廷評俊民萊州人嘉祐六年進士狀頭登苐釋褐廷尉評簽書徐州節度判官明年充南京考試官未試間忽謂監試官曰門外舉人喧噪詬我何為不約束令人視之無有也如是者三四少時又曰有人持檄逮我色若恐懼乃取案上小刀自刺左右救之不甚傷即歸本任醫治踰旬創愈但精神恍惚如失心者家人聞嵩山道士梁宗朴善制鬼迎至乃符召為厲者夢一女子至自言為王所害已訴于天俾我取償俟與簽判同去爾道士知術無所施遂去旬餘王亦卒或聞王未苐時家有井竈婢蠢戾不順使令積怒乘間排墜井中又云王向在鄉閈與一倡妓切密私約俟登苐娶焉既登苐為狀元遂就媾他族妓聞之忿恚自殺故為女厲所困夭閼而終樊預樊預眉州人登進士苐為杭州觀察推官素有異相胸生四乳一日忽題於􅈦之堂扉云三聲鼓角雲中見一簇樓臺海上高人莫喻其旨後數日若有牙兵數百人來云吳山大王遣以奉迎預乞延數日處置家事迓者乃去亟召同寮具以事告且訴鄉里遼逺期津遣孥纍之意同官見其無疾而遽有是語以為病狂或訊其事之委曲終不答又信宿乃卒卒時正嚴鼓時也吳山即子胥之祠據州中之高阜有樓殿亭宇之勝鼓角樓臺之句乃自讖也後州民聞甲馬巡徼之聲或見樊總督者州人遂塑其像於神側自是不復見其子祖親説括異志卷苐三
