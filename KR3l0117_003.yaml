front:
  text: 括異志卷苐三
  hash: sha256:7436f378d8c2a0bda6c65f3d24ebc6d300cf2a2889f2e98361d89a7eb2f8500f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0117_SBCK_003-1a}
body:
  text: 襄國張師正纂馬少保太子少保馬公亮自言少肄業于廬州城外佛寺一夕臨窓燭下閱書有大手如扇自窓伸於公前若有所索公不為視閲書如故如是比夜而至公因語人有道士云素聞鬼畏雄黄可試以辟之公乃研雄黄漬水宻置按上是夕大手又至公遽以茟濡雄黄大書一草字書畢聞窓外大呼曰速為我滌去不然禍及與汝公雅不為聽停燭而寝有頃怒甚而索滌愈急公不應逮曉更哀鳴而不䏻縮且曰公将大貴我且不爲他怪徒以相戯而犯公何忍遽致我于極地耶我固得罪而幽冥之状由公以彰暴扵世亦非公之利也公獨不見温嶠􅛚犀照牛渚之亊乎公大悟即以水滌去草字且戒他日勿復擾人怪遜謝而去進士魏泰言馬公嘗說於其祖云潘郎中潘郎中継宗清河人以明經發第有吏材天聖中自國子愽士通判乾寜軍其母亡以十餘歳一日於堂前呼家人令召其子容状衣服宛如平昔潘再拜號哭母急止之曰可於堂西偏隔以帟幕前下一簾中安二榻吾将與伴我者二婦人息焉旣而語云吾死亦無大過隂官但致我一室中不令他適汝旣升朝封我為縣太君隂官乃縦我出入汝前歳知導江縣我嘗至彼相視以水晶柱斧倒置植扉後吾亦未有生期恐乆溷汝聊以爲識也今我徃生兾州北門内街西磨坊某人媳婦䖏為女因得来此家人日夕具飲食惟聞匕箸聲視之如故留月餘告去舉家送之郊外空中有哭泣聲乆而不聞潘旣受代道出信都詢之皆如所說潘後常以緡帛遺其家潘之子士龍今爲正郎胡訥嘗著孝行録亦記潘夫人亊樂火卿光禄卿樂公滋性沉厚少年修學時嘗就祖母寝榻前燈下看書一夕二皷後燈檠揺動如人携持周行室中復止故䖏樂亦不懼明日言扵門下客客不之信是夜取檠置學舍中明燈而坐才二皷復行如𥘉客大呼而走遂命斧碎亦無他異徐郎中徐郎中莱州人忘其名弱冠侍父假守嶺外乾興中仁宗登極部賀禮赴闕至武陵一驛将舍正寝驛卒言其中有物怪徃来無敢居者碩易他次雖不以為然亦出寝於􅈦之屏後夜将半夢有神人状甚偉手携竹籃其中皆人鼻也叱汝何䓁人敢輙居此以妨吾路徐恐懼愧謝神乃端視之曰形相非薄但其鼻曲而小吾與若易之遂於籃中擇一鼻先劓徐鼻擲去以所擇鼻安之仍以手指周固四際夢中亦覺痛楚神笑曰好一正郎鼻也徐之鼻素不隆正自夢易之後自然端直歴官駕部郎中致仕隨其子秘書丞朔在維揚簽判治平四年物故劉太愽興州依山爲守居層疊而上正寝尤髙復搆樓於上俯視儀門如指掌寚元中太常愽士劉公中逹假守是郡一日與家人登樓見白衣者入客次若舉人状劉遽曰有客至吾将延之遂下樓升􅈦果有舉人投刺劉接之坐移刻各不語告去遂循東廡而下左右告曰當自西廡舉人不荅直趋東廡井次投身而入劉大駭遽索井中無所得而亦不能究舉人者自何而来月餘劉卒前進士程覺言刁左蔵刁左蔵允升嘗提舉大名府左廂馬監在軄歳餘卒其家先寓於大名朝城縣熈寜二年秋刁捐舘半歳次子總忽見父坐于城門之側行李從者無異平昔惟從人悉衣白方驚懼其父以手招之即詣前拜且哭刁遽止之總問曰大人今主何亊刁曰吾嘗亊范希文渠今主隂府俾我提舉行疫者今欲徃許州以南廵按道出此故暫来視汝因曰汝母明年八月當死但預爲備勿告之恐渠憂撓孫某来年五月亦當卒此皆冥籍先定汝冝自寛孫乃總之愛子也又曰市中仇某不半歳必刑死因懐中取鴉青紙一幅有金書七十餘字授總曰善保持勿失墜遂上馬呵道出南門而去閭卷悉見行數里逢市人張五者避立路左刁謂之曰我欲倩君可乎張曰諾乃謂曰若暫到我家語吾児後月南市當灾且慎之我已留從者五人防視必免焚如張亦不知是鬼也遂詣刁宅欲逹其語聞宅中大哭少選總出詢方知刁久已棄世其妻洎孫如期而死邑中官吏知有火災日夕戒居人儲水謹火禁月餘火自空屋發與刁居宻邇四鄰悉焚惟刁宅獨完仇某者聞當刑死杜門不出一日與客奕碁于所居之門下有誦佛書而丐者仇屢謝之不去語頗不遜仇忘刁之言毆之即死竟斃于枯木金書人皆不識之字書亦無事聞之借軄刁綽言吕郎中吕郎中元䂓治平𥘉爲廣南東路提點刑獄公宇在韶州宅堂之後有園亭亭下植荔枝數㧣夏五月實盡丹翌日将召賔僚開樽以賞之其亭暮則扃鐍人迹所不至詰旦啓户無一實在枝但見殻核盈地於板壁題詩一絶云我曹今日㑹家親手把洪鍾飲數廵滿地狼籍不知曉荔枝還是一畨新歳餘吕以事去官其姪子邈言錢齋郎治平中有錢齋郎者調于吏部挈其妻居京師一日其妻𬒳夫之衣冠語言皆男子也状如病心召符禁者視之術皆不效聞孔監丞者有道術䏻已人疾苦遂詣其居告以妻之所為孔許至其居翌曰乃来與錢偶坐其妻冠幘束帶徃来于左右詈曰汝是何人預我家事乆之孔都不與語俄而獨曰莫須着去否孔因謂曰汝本何人輒慿人之室家可乎乃曰我嘗𬒳一命而死亦曽舉進士頗探釋老書昨到京師無處寓止暫慿附于此人孔曰旣若曽渉獵三教是識理之人也汝在世仕宦之日汝之室肯令他人慿之乎鬼黙然又謂曰汝旣言曽探釋老有爾許大虚空何所不容而言無寓止之所言訖錢妻瞢然而倒半日乃寤詢其前事皆不知也得之張稚圭言邢文濟華隂縣雲臺觀道士邢文濟常掌華隂道司事故得紫其服號虚寂大師旣免道軄專主金天南祠郷人歳時獻施金帛甚夥邢悉裒為私蔵間充酒色之費有廵檢某人者知其事宻令人喻旨邢屢以所得賂之一夕邢夢人攝至金天殿下見廵檢亦在廷中有若胥吏者詰二人以盗用神物皆服罪各鞭背十二遣歸邢旣寤覺背間楚痛遂詣巡檢話昨日之夢驚曰我夢亦然月餘邢病背瘡死廵檢者亦患疽相継而殂得之董職方經臣録蒿店廵檢渭州蒿店有廵檢𪠘宇率命班行領卒數百戍焉慶曆中羌人入㓂廵檢張殿直者應援于外其家悉爲蕃賊所俘虜旣入賊境骨肉皆爲賞口其妻分肄一畨酋俾主汲煬之役每荷汲噐至水次必南望大慟而後歸其家一犬亦攘掠而得者常隨妻出入屢㗸其衣􅊯􅊯而吠揺尾前行十數步囘顧又鳴如此者半歳妻因泣謂犬曰汝䏻導我歸漢耶犬即躍鳴妻乃計曰住此而生不若逃而死萬一或得逹漢計遂决竢夜隨犬南馳天将曉犬必擇草木岑蔚之䖏令妻跧伏犬即登髙阜頋望意若探候者時捕雉兔衘致妻前得以充飢凢旬日逹漢境廵邏者以聞訪其夫尚在乃好合如故自此朝暮所食必分三噐一以飼犬斯事番人具知之評曰犬六畜也惟豢養之戀旣陷夷狄之域尚由思漢又䏻導俘虜之婦間關而歸可謂獸貌而人心也有𬒳衣冠而叛父母之國者斯犬之罪人也王廷評王廷評俊民莱州人嘉祐六年進士状頭登苐釋褐廷尉評簽書徐州節度判官明年充南京考試官未試間忽謂監試官曰門外舉人喧噪詬我何爲不約束令人視之無有也如是者三四少時又曰有人持檄逮我色若恐懼乃取案上小刀自刺左右救之不甚傷即歸本任醫治踰旬創愈但精神恍惚如失心者家人聞嵩山道士梁宗朴善制鬼迎至乃符召爲厲者夢一女子至自言爲王所害已訴于天俾我取償俟與簽判同去爾道士知術無所施遂去旬餘王亦卒或聞王未苐時家有井竈婢惷戾不順使令積怒乗間排墜井中又云王向在郷閈與一倡妓切宻私約俟登苐娶焉旣登苐爲状元遂就媾他族妓聞之忿恚自殺故爲女厲所困夭閼而終樊預樊預眉州人登進士苐為杭州觀察推官素有異相胸生四乳一日忽題於􅈦之堂扉云三聲皷角雲中見一簇樓臺海上高人莫喻其旨後數日若有牙兵數百人来云吳山大王遣以奉迎預乞延數日䖏置家亊迓者乃去亟召同寮具以事告且訴郷里遼逺期津遣孥累之意同官見其無疾而遽有是語以為病狂或訊其亊之委曲終不荅又信宿乃卒卒時正嚴皷時也呉山即子胥之祠㩀州中之高阜有樓殿亭宇之勝皷角樓臺之句乃自䜟也後州民聞甲馬廵徼之聲或見樊總督者州人遂塑其像於神側自是不復見其子祖親說括異志卷苐三
