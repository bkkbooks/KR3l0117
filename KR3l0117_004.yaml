front:
  text: 括異志卷苐四
  hash: sha256:e0effe6d6cc04d3dee230a58c0770fbac743f088c2ed9d3a4e661d76370ffcd4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0117_SBCK_004-1a}
body:
  text: 襄國張師正纂陳省副慶曆𥘉陳吏部洎自三司副使謫守鍾離郡比曹貟外錢愚時為通倅錢善數術一日俾其邑封具酒肴悉召陳宅之長幼會于倅居明日錢詣陳謝曰昨日以菲薄奉邀貴眷者聊示區區之意以託後事爾陳大驚曰足下四體甚安以言何謂也錢曰明年正月某日某當死乞護送諸孤歸京師故棲則幸甚陳知錢善數術亦不以為然愚嘗謂其妻子曰陳亦行尸耳過明年復舊官則不可矣明年正月如期而卒月餘陳徙廬州未半歲復召為三司副使數月病背疽而死越三日陳有少女奴年十二三忽據榻附而降語曰吾昨日巳見王將設酒我辭以創痛而止門外從者五十人悉戴漆皮辨衣皂緑緋寬衫烏氊靴亦無異人世不復號慕以自苦也又數日復降語命設榻如賔主位曰此前濠州同官錢比部也吾今得知益州復與比部同官前日已嘗宴會相得之歡不異平昔可令院子傳語錢家縣君言比部教善視十一郎比部幼子最所鍾愛者今再與陳吏部同事甚樂勿思念悲慟也先是二日錢之幼女方十餘歲睡中京號呼之良久乃寤曰我見比部與陳吏部在丨一髙堂上宴會樽爼㡩幕無不華麗左右侍衛甚盛因念父巳去世不覺啼泣𬒳呼方省與陳宅女奴降語相符昔之小説載幽冥事者多云人間郡縣隂府悉同若陳吏部之為益州豈其然乎比部之子閎今為供備庫副使言之甚詳王待制天章閣待制平晉王公質之謫守海陵也郡之監兵治宇之西偏有射堂堂之前藝𬞞為圃一日晨興治圃卒起灌畦見一老媪立射堂中氣貌甚假卒驚詢之媪曰我乃監兵之母也汝亟白我在此卒曰監軍不聞有毋媪何妄也媪曰苐告無多詰卒入白監軍遽出視之姿狀音息真毋也而言語哀惻監軍號慟家人己下皆往拜侍母急曰以幕羃射堂之軒使不外矚既而詢其所從來母曰冥中有一事應未受生與見伏牢者皆給假五日我獨汝念是以來耳監軍遽謁告且白平晉公平晉公朝服往拜而以常所疑鬼神事質之皆不對曰幽冥事泄其罰甚重無以應公命平晉又問世傳有閻羅王者果有否復誰尸之曰固有然為之者亦近世之大臣也請其名氏則曰不敢宣于口公乃遍索家藏自建隆以來宰輔畫像以示之其間獨指寇萊公曰斯人是也復問冥間所尚與所惡事答曰人有不戕害物性者冥間崇之而隂謀殺人其責最重如是留五日遂去或云平晉由此不復肉食平晉嘗為之記其子復以示魏泰云石比部比部外郎石公辨言皇祐中始得大理寺丞監并州之徐溝鎮歲餘夢一鬼朱髮青膚自中霤下瞰垂臂捽一女女子髮自地而出謂之曰送汝往李專知家作女石驚覺心悸遂不寐逮曉時有酒稅埸官姓李者石因問爾昨夕有何事李曰四更𥘉息婦生一女子石歎異久之其後嬰兒有疾召一姥視之曰本太原人隨夫寓此僅四十年凡官于此者無不出入其家此𪠘宇亦曩日都監之官舍徐溝舊差班行監當今差京官今中霤之下者嘗有井李殿直監臨日鞭一女使不勝楚痛投井而死遂廢不汲仍遭大水湮焉石愈驚駭方省前夢之驗也曹郎中曹金部元舉治平中嘗為福建路轉運使𪠘宇中有池亭曹朝夕止于是家人怪其肌體日瘠精神恍惚訊之即曰嘗有李家娘子甚美與二婢子來侍我咸謂物怪所惑召醫巫視之悉無效乃涸池求之得三鱧一大二小曹遽呼曰勿害李家娘子遂臠而焚之曹亦謝病歸維陽歲餘卒陸龍圗龍圗陸公詵尹成都日府宅堂前東南隅有大枇杷一株其下夜則如數女子聚泣者燭之則無所見厥後半歲陸卒於位熙寧六年成都闤闠間遇夜邏卒聞哭聲􅊯􅊯然凡數十處就視之則無有至七年八年大旱殍餓盈路繼之以疾疫死者十六七洎至秋麥則無人收刈至於綾羅紗錦綵箋諸物鬻者亦少宜乎魄兆之先見也丁都官餗目覩宋中舍太子中舍宋傳慶諌議大夫太𥘉之子自言其父性嗜鱉嘗一日得數鱉付厨婢臛之其一甚大婢不忍殺放之溝中逾年婢病疫疾苦心煩熱殆將卒家人舁致外舍俾卧以俟終翌日視之則自户閫至婢胸脅間皆青泥塗漬婢亦稍間訊之則云不究其泥之來但煩熱減差耳家人伺之逮夜有一大鱉自溝中𬒳體以泥直登婢胸冰之婢逾旬遂愈詢其致鱉之自婢乃述其本末天聖中傳慶為遂寧通守與先君言如此馬文思文思副使馬公仲方尚書亮之姪也遇罷官多寓家髙郵軍細君之妹亦居是邑嘗以牝羊饋於公未幾生一羔秣飼數月間居患無人牧放乃鬻於屠肆翌日臨格將烹之出刀于側且瀹水以備燖濯將刲而亡其刀良久見其靶于溝中取而洗拭置于床旋又失之乃羊所生羔銜而投諸溝又以足踐淖使勿見屠者視之大感傷後以羊歸馬氏自此不復屠羊公亦以羊施佛寺公嘗守全州嘗自書斯事于閲理堂之壁云陳太博太常博士陳公舜俞在明州觀察推官有二子一男一女皆六七歲一日戲嬉于外逮歸則男子靣有墨規其左頰女子朱規其右頰家人怪問其所規之自則云不知家人但謂小兒戲而為之命滌去翌日復然如是幾月餘日日如是而無他怪陳慮為怪之漸也白轉運使求涖他局遂沿牒于浙西𪠘既空郡給二皂以守舍一日二人相與言曰陳察推向以二兒面有畫以為怪而竟無他我等當驗之有能獨入堂中自朝至暮者醵錢若干以賞之一皂欣然携短劒入堂之西序醉卧牖下及醒日已過午吏喜其無怪又喜將獲所賞也徘徊伺晚而出俄然堂扉啓有數婢從一婦人臂鸚鵡立堂之戺若所規畫然吏熟視默念曰苟怪止如是亦何足畏方將以刃劫之忽心動若大悸不知其身之所有驚呼携劒突門以走犯譙門穿長街若發狂失心者市人覩其持劒以為有變皆恐避之未半里蹶踣道左衆掖起奪劒而詰之移刻始能言竟不知其何怪也進士魏泰遊明州親見此事馬仲載熙寧六年開江南為郡縣既得峽州築為安江城命內殿承制馬公仲載統卒三百戍焉時石鑑以兵馬鈐轄知辰州總千兵亦駐城中一夕邏卒云蠻兵數千夜當攻城石聞之即欲遁去馬曰鈐轄儻出則誰與守遂仗劒於門令曰敢出者斬石遂留蠻兵亦不至由此石頗銜之未數月馬忽仆地懵然無所知僕從乃舁辰州就醫藥石乃劾其棄城戍將以軍令裁之馬病稍間就鞠于武陵乃具饌遙訴司南嶽翌日有稚子方十嵗未嘗讀書忽睡中呼索紙筆乃書曰南嶽門下牒敕馬仲載念卿遙祭之專勤聽其訴聲之怨切據卿之罪理當喪命上天愍卿常行吉心能守所職止命降災奪官更宜省循以邀福夀懋哉幸矣熙寧六年十一月二十四日復取朱筆畫一印於日月上篆文亦不可辨兒復睡少選而寤詰之云有一人青巾黃衫以黃敕付我亦不知其手自摹寫也仲載之事武陵人無不知者南嶽敕好事者多録而藏之夏著作尚書郎高公靖蔡州人罷官歸鄉里村居嘗坐壠上視農事有耕夫於土壤得鐡牌上有大字云司法參軍夏鈞髙亦不喻數年授知道州相次有長沙人夏鈞調本州司法參軍高方悟鐡符之前定也鈞官至著作佐郎兾祕丞兾祕丞􅈾皇祐中知河南府緱氏縣代人將至預徙家于洛城獨止于縣之正寢一夕夢二女子再拜於榻前問其所以云妾等是前邑尹家女奴也以過𬒳鞭死瘞于明府寢榻之下向來宅眷居此不敢妄出恐致驚怛今夕方敢誠告乞遷于野乃幸之大也兾可之明日發其地果得二枯骨紅梳繡履尚在命褁以衣絮祭以酒飯加之楮錢埋於近郊數夕後夢中前謝而去樂長官浩言之梁寺丞梁寺丞彥昌相國之長子也嘉祐中知汝之梁縣其內子嘗夢一少年黃衣束帶紗帽神彩俊爽謂之曰君宜事我不爾且致􅍔既窹白梁梁不之信既而竊其衣冠簮珥挂於竹木之杪變怪萬狀梁伺其嘯拔劒擊之鬼曰嘻汝安能中我又命道士設醮以禳之始敕壇奪道士劒舞於空無如之何謂梁曰立廟祀我我當福汝既困其擾不得已立祠于𪠘舍之側又曰人不識吾面可召畫工來我自教之繪事既畢乃內子夢中所見者會家人有疾鬼投藥與之服輒愈歸之政事有不合於理者泊民間利害隱匿亦密以告梁解官廟為後政所毀鬼亦不靈聞之洪正卿進士云楊郎中郎中楊公異性好潔靜過甚不近人情寓居荆南對門民家有子數歲膚髮悉白俗謂社公兒異惡焉屢呼其父與五緡令殺之民得鏹潛徙去楊止一子俄病癩肌潰而卒近時有人死而復生云隂府新立速報司若楊氏之報信哉張太博治平三年太常博士張忘其名知兖州奉符縣太山廟據縣之中令兼主廟事歲三月天下奉神者悉持竒器珍玩來獻公往往竊取之既解官寓家於東平一夕聞中闔外如數十人語聲雜遝不可辨晨興視之其所盜㡩幕器皿之類悉次第羅列於􅈦廡間視槖篋封鐍宛然如是者凡數夜張大怖駭悉取燔之越三日奉符舊事發兖州獄吏持檄來捕既就逮左驗明白竟置牢户楊從先殿直楊從先至和𥘉監大名馬監其冬夢授樞密院劄子云千里重行行右劄付從先準此既覺不喻其旨明年春大雪牧馬多死監牧使臣衡替者數人乃悟千里重字也以配行衝字也再言之者皆𬒳責也括異志卷第四
