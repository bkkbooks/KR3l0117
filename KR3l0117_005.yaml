front:
  text: 括異志卷苐五
  hash: sha256:fe53cc51d018fa06c28595e75c45d23c6f4a7de9cbd7eef77f7756bd866a4a69
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0117_SBCK_005-1a}
body:
  text: 襄國張師正纂李參政李參政至性修潔夷淡年幾強壯尚為布衣開寶中有省郎典齊安郡至依門下為學讀書著文夜分不寐一夕有二女子盛冠服鳴珮璫揖李而坐容態殊麗風度婉約李恍不知其所從來因定神肅容熟視而問曰鬼邪仙邪答曰奴非鬼也乃仙之流亞也少時出户不見自此月三至或飲之以酒或啜茗而去談幽顯之事辭簡而理明守將受代二女復來謂李曰與君欵奉三年於兹矣見君居常以禮自持未省一言及亂器識洪厚終當逺到然君前世曽為商賈負人息錢甚夥以貧不能償故今世俾君羇蹇於壯歲因出書一封與至曰俟改元太平乃啓不爾當有禍既而太宗踐祚改元太平興國啓其封見太平興國二年李至第二人及第既而果然後歷清顯入參大政擁旄巨鎮而終樂京著作嘗言梅侍讀侍讀梅公詢端拱二年第進士清𥙿有才早厠文館坐在人洎滯者數十年景德中嘗夢與一士人年甚少共射一石牛梅中脅少年者中首至祥符中真宗東封詢𬒳選於太平頂行事宿齋其上是夕燔香再拜默祈將來通塞之事既寢夢牛馬羊布野有二牛鬪于前一人𬒳冠服前謂牛曰伺吕公再入中書鬪亦未晚牛遂解去其後自尚書郎帶職知濠州吕申公以太常博士通守郡事儀狀酷似向夢中所見又守倅之居花圃中各有一小石牛梅因省前夢厚結於申公寶元中吕公入相擢梅為天章閣待制其後申公自北都再持政柄梅己為樞密直學士判審官院又遷為侍讀學士郡使是歲十二月得疾出守許州以至捐館夢中所見牛馬乃郡牧使也二牛鬪者其年歲直丑十二月又丑也二牛者逢二丑而疾作也神先告之矣評曰君子居易以俟命語曰冨而可求也雖執鞭之士吾亦為之明富貴貧賤以時而來不可規圗而取梅公早預俊選屯蹇不振年始從欲方遇知己官歷兩省職居禁近擁旄巨鎮克享遐齡始否終泰豈非命耶韓宗緒韓宗緒龍圗贄之子以父任輔將作監主簿皇祐秋鎮廳預薦偶於相國寺資聖閣前見其家舊使老僕呼謂曰若非某乙乎死久矣何得在此曰某今從送春榜使者又問榜可見乎曰有司收掌甚密不可得而見也又謂曰汝能密詢有我姓名手茍無亦可料理否僕許諾試為盡力又問復於何處為約㒒云復期于此他處難庇某之迹此地雜沓人鬼可得參處他日如期而往㒒界在焉遂開掌見己之名在片紙上揭其下乃田寶鄰也僕曰此人明年當登苐官甚卑郎君亦自有科名但差晚耳况身已有官故得而易之若白身則不可因忽不見明年韓登第曽以兹事説於親舊間治平中韓玉汝龍圖與供備庫使假繼文同使契丹至雄州假嘗為雄之監軍雄之舉人皆上謁田寶鄰刺字厠焉韓見之大驚與假盡道所以假復以韓事本末語之曰遂齊戒夜醮作奏訴于帝木炎嘗侍父官瓦橋備知之熙寧中炎登第為嶽州巴陵簿縣令王澤嘗談怪異王云應舉時聞州東有一人常入冥言人吉凶甚驗遂率同人數輩就問之其人在小邸暗室中既見遂以將來得失叩之再三不語俄又面壁而坐云田寶鄰公事至今未了安敢有他科埸事不知田寶鄰何人也炎方省向者韓假之言寶鄰以纍舉特奏名其後官甚卑南州壬子虞部貟外郎杜公彬罷滁倅至闕奉朝請一日遊景德寺訪朝客不值方假筆札以志門偶狂僧嚴法華者自廡下直揖杜君杜雅聞法華言事多中因以平生未然之事咨之僧奪筆索紙杜以刺字之餘授之大書云南州壬子杜不測其旨後數月授知漳州到州閲圗經則陳氏偽據日目漳為南州杜嘆訝之自揆以為壬子者有士之號豈隱其為州之意丨邪後嵗餘杜終於任其子煜用浮屠法作七齋飯僧次煜因言及法華之事取其書以示群僧因觀其壬字中一畫差長若壬丨字遂以甲子推杜君卒之日正壬子也其子煜言之於魏泰并出其書李侍禁李侍禁齊善袁許之術士大夫多喜之有别業在華隂之東郊其妻先卒買一妾生二子一男一女李既死二子始髫齔長男年二十餘乃嫡室所出與其妻謀曰二子長立當有婚嫁之費且分我資産能致之死地家資悉我有也自此二子衣不得完食不得飽笞罵挫辱無日無之俄得疾疫遂絶其藥膳雖杯水亦不與相繼皆物故妾不勝怨憤日走伏齊壠號哭以訴數月妾亦死有鄰家子於閴巷見齊手携二子妾亦侍側顧謂鄰家子曰我長男不孝不友虐殺弟妹又令此妾銜恨而殁若可語之吾亦訴于隂府不汝置也鄰家子知是鬼將走避因忽不見鄰家子遽來告之亦不之信一旦其妻具酒肴會親舊女客於中堂厥良獨坐書閣下乃父自外至數其罪以杖擊之坐客聞其號呼悉往視但見仆地叩頭服罪言虐殺二子狀數日乃死其妻後數月亦死田宅家資悉籍沒噫李齊之事不誣矣世之人父死而謀害幼稚以啚資賄者多矣目覩數族雖不若李為鬼靈但見其身夭折子孫淪胥以至無立錐之地李齊之事足使狠子庸婦聞之少警其心董職方經臣親見兹事云李氏婢賈國傅大沖嘗説有李某屢典郡既卒家人歸京師舊居有老婢凡京城巷陌無不知者家之貿易飲膳衣著洎親家傳導往來悉賴焉邑君愛之如兒姪明道春方淘溝俾至親家通起居抵暮不歸數日尋訪無迹邑君曰是媪苦風眩疾作墜溝死矣即命諸婢設靈座祭焉家之吉凶亦來報邑君泣曰是媪雖死不忘吾家明年春自外來家人皆以為鬼也媪拜曰去歲令妾傳語某人至某處風眩作墮溝中某人宅主姥見之令人拯出滌去穢汚加以藥餌得不死某誓傭一年以報今既期即辭歸往詢某氏果然是夕有青巾男子見邑君夢曰我清衛卒也向死于巷左昨聞宅上失女使設位以祭遂假其名竊享焉今聞己歸乃拜辭而去李比部李比部從周景祐四年隨鄉書來京師與數同人僦舍於麻秸巷嘗五鼓而興將謁親知于逺坊者始啓寢户即踣于地奴僕扶視氣息殆絶至己午間始惺然曰𥘉啓關見一鬼戴短巾衣緑寬衫􅉳靣于𩕄狀若祠廟中所謂判官者以氣噓之如霜風之切骨遂昏然亦不知委頓於地也明年校藝不利於南宫胡殿丞胡殿丞偃潭州人至和中授峽州簽判待闕荆州僦居于公安門內睱則坐於􅈦戺間嘗有持刀鑷者比日過門植足注視良久乃去胡異之一日呼與小兒剃髮因問曰汝常顧吾門內何也曰有一親識姓某在峽州為吏兼管冥曹事多而身勞欲公垂庇是以日踵門而不敢言胡未之信及至任聚群胥出姓名問之有一人前曰刀鑷漢竟多口胡屢詢以冥司所職但云未可輕泄居無何胡以先人忌晨飯僧課經具疏焚楮泉逮明日其吏至案前以手就懷探昨日所焚疏示若新寫者巳而灰滅且曰殿丞見迫不敢隱然某巳得罪而殿丞亦不免減祿算矣數曰吏暴卒期年胡以病廢於家得之李林祕校云謝判官謝判官平原人寶元中嘗為曹州觀察推官視事未幾一夕夢老父引之入大第中家頗豪盛妳媪抱嬰兒飾以文繡指謂謝曰此君之後身也謝問此何郡復誰氏之家老父曰成都府陳郎中宅也資産甚豐君心樂乎謝亦頷之既寤甚不懌謂妻子曰吾其死矣日處致後事既而秩滿復調棣州判官到官數月又夢前老父復引至昔之第有小兒衣紈綺歔階下指謂謝曰此前日之嬰兒也今始五歲尚未語既寤謂家人曰今日之事必不可免居常戚戚不怡考滿又將赴調復夢老父導之入門見昔日之兒冠緋帽紫𫀆銀帶立於堂戺顧謂謝曰此子已讀書矣若其謝我覺大惡之月餘病卒其子訥慶曆六年登進士第親説如此劉觀察宅京師保康門有劉觀察之别第每僦於人翰林學士曽布嘉祐丙申之冬以鄉貢將試禮部僦此第以居一夕不寐聞􅈦中有人呼曰太尉來既而又有若往來問訊切切細語或如傳授指令皆以太尉為稱歷歷可審甚訝之翌日究其宅之坊曲地里則韓通之故第也通嘗為王彥升族於斯第之下進士魏泰親得之於曽子宣云柴氏枯棗邢州城東十餘里周世宗之祖莊也門側有井上有大棗一株世宗時柯葉茂盛垂蔭一畒恭帝既禪棗遂枯死明道中枯卉復生一枝長一丈餘蔚然可愛井中水如覆錦繡柴氏懼遂塞井伐木明年詔求五代帝王之後柴氏自邢蔡􅉑等州諸族𬒳甄敘入官者三十餘人井棗之祥亦非虛應僧緣新武陵郡西有佛廟曰栗園院主僧畜一犬幾十年一夕夢犬語云纍歲荷畜養之恩今當與堤頭杜翁家為男故來奉辭僧既覺不以為意黎明侍者以犬斃聞因大驚乃䇿杖至惿頭杜迎門謂曰何出之早也延僧坐僧曰昨夕檀越家豈有子孫之慶乎翁對以息婦夜生一男及詢以何由而知僧遂以夢告翁亦駭異因許之為浮屠令以披緇剪髮法名緣新鼎人率知之括異志卷苐五
