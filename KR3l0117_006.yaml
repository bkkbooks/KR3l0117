front:
  text: 括異志卷苐六
  hash: sha256:e00f5532dad903d553b3c493f3e5db7cbe1654a9a2c779da80cd3011ae4ba8c2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0117_SBCK_006-1a}
body:
  text: 襄國張師正纂王少保少保王公明開寳八年乙亥拜秘書少監黄州刺史時王師問罪金陵公帥師入豫章市不易肆至戊寅歳受代徙傳舍有黄衣来謁延之坐乃曰公總兵入州洎解任不戮一人惠及物者大矣隂隲垂祐無彊䄂中出一通青𥿄朱篆數幅曰他日舟至大孤山當有黄衣来謁必䏻識之才出門即不見及至大孤山果有黄衣止公大喜亟召見即以篆文示之乃曰請紙筆易爲真字即烏犀丸方書畢而去公神其事遂依方合之服者無不效盛太尉乃太保之孫女壻得黄衣親書本盛疾作服之亦愈范叅政文正范公仲淹字希文天聖中以帖軄通判陳州時郡守以太夫人疾病召一道士俾奏章祈祐築壇于正寝郡守召公預其事公竊笑曰庸鄙小人安能逹章帝所耶但郡守以太夫人之故多方以圗安耳旣而復謂道士曰仲淹将来休咎可得知之否道士曰唯俟至天曹問之旣而秉簡贄章伏于壇自乙夜至四皷凝然不動試捫其體則殭矣殆五更手足微動遽扶坐於床飲以茶藥良乆謂郡守曰奉賀太夫人尚有六年壽所苦不足憂也又謂公禄夀甚盛必入政府郡守問今夕奏章何其乆也道士曰方出天閽遇放明年進士春榜觀者駢道不得出是以稽留公益不以為然問曰状元何姓曰姓王二名下一字墨塗之旁注一字逺不可辨旣而郡守之母疾苦㝷平明年春榜状頭乃王拱壽御筆改爲拱辰公始歎道士之通神亊聞之畢國傅仲逹陳著作之方云麥道録麥道録本宦者嘗為入内供奉官勾當事材埸一日出西水門有丐者死於汴河岸之側有敗席短杖時方大雪獨不積其身麥異之為市衫褲麻屨故巾瘞之於隙地他日奉使鄜延至蒲坂北一郵置有一貧人詣門請見仍云嘗受恩故来致謝麥召見詢其由曰自頂至踵皆君所賜也麥罔然良乆方省瘞丐者事乃延坐與語屏左右移時而去麥旣囬京發瘞但見席杖而巳麥遂棄官為道士為左街道録年九十餘卒聞之于朱左蔵允中楊道人楊道人者不知何許人也徃来郢之京山縣豊國范頓市中好與小兒戯狎雖大寒甚暑而未嘗巾幘衣裳惟祼露而或以衣服贈之旋即施與丐者故人尤悪視之徃徃逆知人中心事復州蘇繹寺丞得一燒朱砂銀法試之有驗徃見之楊即前曰澁澁酸朱砂燒盡水銀乾更不復語又彭長官者欲求地葬其母以𥿄干之乞數字直書云翻車二十五千旣而果於翻車村得其地以二十五貫市之熈寜癸丑歳辛子儀令京山禓每来謁之贈以衫㡌或留宿外齋雖設衾榻宻視之已安寝於地矣未㡬索𥿄筆横作二畫自一二三四書訖授子儀諦視之乃四字也果至四月而乃父棄世道塗商販皆云見其死於數䖏矣而形状不改熈寜七年卒於范頓豪民張絳家為買棺埋于市側市民朱如玉方客京師是日見楊来訪不交一言後朱自京師囬白縣開其蔵惟空棺耳其異迹甚多䏻記其一二也辛都官子京録示李芝廣州新㑹縣道士李芝性和厚簡黙居常若愚者間為兩韻詩飄飄非塵俗語常讀史傳善吐納辟穀之術膚體不屢濯自然㓗清髪有緑光立則委地所居房室不施關鍵邑人崇向施與金錢衣服無筭人取去未嘗有言或召設祠醮一夜有数䖏見者至和中多虎暴芝持䇿入山月餘方出謂之曰已戒之矣自此虎暴亦息余至和中親見之今則尸解矣張白張白字虚白自稱白雲子清河人性沉静博學䏻文兩舉進士不第㑹親䘮乃泣而自謂曰禄以養親今親不逮于禄何為遂辟榖不食以飬氣全神爲事道家之書無不研賾開寶中南游荆渚時郷人韓可玭為通守延納甚懽㑹朝廷吊伐江呉軍府多事因禠儒服爲道士適武陵寓龍興觀郡守劉公侍郎墀監兵張延福深加禮重嘗以方鑑遺張曰收之可以辟邪白韜真自晦日以沉湎為事傲乎其不可得而親者徃徃入㕓市中多所詬罵切中人微隱之事衆皆異之每遇風雪苦寒則必破冰深入安坐水中永曰方出衣𥜗沔濕氣如蒸炊指顧之間悉以乾燥或與人為戯仰視正立令悪少數軰盡力推曵畧不少偃又或仰卧舒一足令三四人舉之衆但面頳其足不動居常飲崔氏酒肆崔未嘗計其直家人每云此道士来則酒客輻湊嘗題其壁云武陵溪畔崔家酒地上應無天上有南来道士飲一斗卧在白雲深洞口自是沽者尤倍南岳道士唐允升魏應時亦當時有道之士也慕其人常與之游白天才敏贍思如涌泉數日間賦武陵春色詩三百首皆以武陵春色裏為題一旦稱疾亟語觀主曰我固不起慎勿燔吾尸恐郷親尋訪言訖而絶身體潤澤異香滿室傾城士女觀瞻累日為買棺葬於西門外逾年監兵罷歸其僕遇白於揚州開明橋問方鑑在否為我語汝郎斯鑑亦不乆留僕歸具道張駭曰渠死乆矣汝何見邪尋索鑑熟視隨手而碎又鼎之歩奏官余安者以公事至掦州亦遇白携大葫蘆貨藥亟召安飲于酒肆話武陵舊遊數日安告行白曰爲我附書謝崔氏余歸致書崔氏覧之大驚遽掘所埋棺已空矣白注護命經窮極微旨又著指玄篇五七言雜詩唐魏集而名為丹臺並傳於時大抵神仙之事見於傳記若白之觧去此耳目相接年祀未甚逺今室而祠之不惟衆所瞻仰抑将傳信於永世也斯皆柳應辰軄方撰祠堂記畧云静長官静長官真定人登明經第寡嗜慾好道家修攝事一旦棄妻子遊名山數年不歸天聖中先君與親舊杜獲向知古㑹於磁州慕容太保之第始然燭叩門頗急啓之乃静也緼𫀆皂絛布巾芒屩把臂甚喜詢其所徃曰自别浪迹於山水間良惟素志今将歸真定視妻孥聞諸君㑹此故来相見旣飲静曰方道舊為樂而酒薄不可飲某有藥以資酒味於小嚢中出藥一粒如弹丸投缾中復羃口良乆飲之氣味極醇烈夜漏上四皷諸公皆酩酊就寝雞旣鳴静獨謂僕夫曰或諸公睡起報云我且歸真定也旣曉相與歎靜藥之為神亟命健㒒走真定問其家云未嘗暫歸余前年寓洛下有醫助教靳襲者於其家常帷一榻枕蓐甚㓗人問其故曰以待静長官静今隱嵩少間歳或一至或再至靳氏以神仙事之嘗以方書授靳由是醫術大行家貲數千萬静今年逾百歳状貌止如四五十人洛人多知之率子㢘衡嶽道士率子㢘落魄無他能嗜酒性狠悖於事多不通易辱人以言人亦少與之接故以牛呼焉居山之魏閣景甚幽邃而子㢘慵惰致蕪穢委積而弗加芟掃以是景趣湮没閣宇圮壊游者以其境汚人陋亦罕到焉故禮部侍郎王公祐以中書舍人守潭州立夏将命祀祝融至衡岳遊覧佛寺道庿殆遍因訪所謂魏閣者群道士告以摧陋無足觀而王公堅欲一視及至則子㢘猶醉寝王公入其室左右呼索之而子㢘酲未觧徐下榻拭目瞪視王公乆之乃曰窮山道士遇酒即醉幸公不以為罪左右皆股慄而王公欣然無忤其應荅之言雖甚俚野而氣貌自若王公異之遂載與還郡日與之飲酒所以顧待之甚渥人亦莫諭何以致然也間辤歸山復止魏閣者又半年然王公問遺時時至山復作詩二章寄之一日忽謂人曰我将逺行當一别舍人即曰扁舟下潭謁王公且曰將有所適先来告别公曰徃何地則曰未有所止縁某一念所詣則翩然逕行恐爾時不復得别故預耳王公留與之飲居二日辝歸魏閣至之日以書别衡山觀主李公盥浴飾服焚香秉簡即中堂而蛻去聞者驚異李為買棺厚葬之殆半歳有衡岳寺僧自京至扵安上門外見子㢘云来看京師即還時蒙李觀主厚有贐行懐中出一書附僧爲謝李發其封真子㢘之書也人皆嘆王公之黙識張都官子諒言許偏頭成都府畫師許偏頭者忘其名善傳神開畫肆於觀街一日有貧人弊衣憔悴約四十許負布嚢詣許求傳神許笑曰君客状若此而求傳神得非有所禀而召僕也邪曰非也聞君筆妙故来耳幸無見鄙即觧布囊出黄道服一襲又出一鹿皮冠白玉簮遂頂矣引其鬚應手而黒且長矣乃一美丈夫也許大驚謝曰不知神仙降臨前言戯瀆誠負媿惕道人笑曰君可傳吾像置肆中後當有識者或求售者止取一千錢不可逾也許如命冩訖未及語携嚢而出許拜謝已不見許遂陳所傳像於肆有識之者曰此靈泉朱真人也求售者日十數許家貲遂日益後以貪直畫且不給每像輒云二千是夕夢道人謂曰汝福有限吾嘗戒汝不可妄取厚直安得忽吾言促其壽也遂掌其左頰旣寤頭遂偏自是呼爲許偏頭慶暦中許年八十餘方卒朱真人者乃朱居士也見唐書列傳杜光庭列仙傅事得之裴長官公愿云張翰張翰江陵人業進士其父前妻生三子而亡父再娶竇氏翰竇出也竇之生歳月日時不利於夫遂减歳遷就吉辰而歸於張氏間與厥夫禱嗣於歸眞觀之三清殿祝辭以所减之齒皆焉継育數子而翰父物故㑹歸真觀火竇宻以鏹五十萬與道士修殿宇少時竇亦死後数歳翰忽為神所慿以手執髻鞠躬曰聽聖語竇氏以詐偽之歳誣罔上真又弗詢於子私用家貲已受考于隂府今則為異類矣事皆秘宻衆所不知者如是不一繇是荆人率聞之噫女子增减其年以利適人者爲過雖小妄以告神則罪大也專取家帑以用搆祠堂不俾子知神尚責怒矧非理而用者乎括異志卷苐六
