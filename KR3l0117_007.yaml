front:
  text: 括異志卷第七
  hash: sha256:595040b959613c33ffd31eff04a2a92ebfeaaa63c8c84ebf70f7dcf709b4e78c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0117_SBCK_007-1a}
body:
  text: 張龍圗龍圗張公燾即樞密直學士奎之子也樞直為殿中丞日奉朝請在京師稅宅於汴河南小巷中居常閉關一日有人叩門頗急大呼曰小師入去何故便不放出張起視之乃一老道士也疑其狂且醉不復與之校量良久乃去邑君先妊娠是夕生燾燾景祐元年苐進士甲科後嘗誤食犬肉夢黃衣使者逮至一府宏麗如宫闕芙蓉觀主慶曆中有朝士冒辰赴起居至通衢見美婦三十餘人靚妝麗服兩兩並馬而行若前導俄見丁觀文度擁徒按轡繼之而去朝士驚曰丁素儉約何姫侍之衆多邪有一人最後行朝士問曰觀文洎宅眷將遊何處對曰非也諸女御迎芙容館主耳時丁已在告頃之聞丁卒辛都官子言云曽屯田屯田外郎曽公奉先嘉祐中知惠州守居有𬞞圃役老卒守之灌蒔尤力凡曽所欲之物必先致之呼而問之汝常逆知吾意何也老卒曰偶然耳再三詰之但唯唯而已曽自此善待之時賚之以酒食一曰薄暮老卒白曽曰荷使君厚顧某非碌碌者今夜三鼓乞使君一到園中有祕術上聞曽欣然許諾及期將具公服詣之家人皆曰豈有郡守夜半公裳謁一老卒哉遽止黎明報園子物故仍於腰下得白金數千兩曽見一道士謂曰何故食厭物張自辨致曰非敢故食誤耳道士曰若然者且止此吾為若言少選復出謂張曰可謝恩乃引至一殿前通曰張燾誤食厭物謝既再拜而悟汗流浹體景元神骨清粹襟懷夷曠豈非仙曹之𬒳謫者歟事聞之張容省元云孫副樞寶元中副樞孫公沔自小諌以言事左遷監永州市征嘗夢一道士喻以牽復之期又曰吾有少田在部下為人所盜可為正之俄而孫移倅長沙因祠嶽廟遍遊道觀佛寺至九仙觀見王真人像克肖夢中之見者詢其公財歲入則云有田數百畒為鄰畔有力者所侵遂檄縣窮究畫取故田還之觀乃梁天監中建後廢唐刺史張覿復加營搆庭有磐石如壇上可坐三十人九仙者皆輕舉於是地晉道士陳興明施存尹道全宋徐靈期齊陳惠度張曇要梁張始珍王靈輿鄧郁之也建昌李覯撰祀章岷書石惋歎不已買棺殯于野數月有人自廣州來園卒附書為謝視其墓四周摧陷柩悉破露發之但緼𫀆巾屨在焉曽以謂尸解也追悔自咎者纍月因而頗失心郭上竈郭上竈者不知何許人天禧中嘗以備雇瀹湯滌器于州橋茶肆間一日有青巾布𫀆而啜茶者形貌瓌偉神彩凛然屢目于郭郭亦既疑其異人又竊覘於袖間引出利劒郭私念曰必吕先生也伺其出即走拜於前曰際遇先生碩為僕厮吕不顧東去郭乃尾後至一閴處吕回顧曰若真欲事我耶可受吾一劒郭唯唯延頸以俟引劒將擊郭大呼已失吕所在乃在百萬倉中巡卒擒送官杖而遣去自此京城裏外幽僻之所無不至見人必熟視良久方去問之則曰我尋先生自此十年餘不知所在天聖末有趙長官者家居磁州邑城鎮之别業忽有丐者緼𫀆而來見趙再拜曰某郭上竈也趙亦嘗識之遂問見先生否郭曰周天下不之見今為大數垂盡故來求一小棺以藏遺骸趙大以為妄問曰何日當盡曰來日午時趙曰若然當為汝買棺仍告曰棺首開一穴將一竹竿通其節插穴中庶得通氣趙雖唯之殊謂不然明日午時汲水浣身卧槐下遂絶趙大異之為造棺河朔乏竹取故傘柄通其中插棺首瘞之于河岸仍恐為狐犬所發植棘纍石以固焉其年秋大雨河水泛漲數日乃退趙慮其柩為水所漂䇿杖臨視其棺果露而四際亦開以杖撥之但見敗絮是亦尸解矣趙嘗為先君言之如是牛用之道士牛用之真定人幼逮事常鐡冠常鐵冠邢州人有道術祥符中得召見後隱泰山復遊天台頗得考召符禁之術自餘杭遊姑蘇落魄不事儀檢好飲酒啖葫蒜犬肉或傳其有道術者人不之信慶曆中薛公純中舍監蘇州市征嘗外嬖一官妓其妻李氏性悍妬不勝忿怒謀害其夫俟薛醉歸以刃賊其要害家人救之獲免會李之父母過姑蘇聞之俾其弟持藥飲之而斃即夕為厲于薜氏擊户牖碎器皿或滅其燈燭或嘯於堂廡遂召巫覡辟除之不能去不得已乃告牛曰此細事今夜可除之乃設酒饌於正寢召數客共飲既夕牛設一案於戺下上置銅鐸始乙夜鐸忽鳴沿案足而下去地尺餘如人携持鳴振而去久乃不聞牛曰俾追捕女厲耳逮四鼓鐸聲自南來俄頃入門坐客如負氷雪毛髮盡植牛乃取一榻臨案而坐如有所詰問曰汝謀殺夫死實其分得不棄市乃大幸也安得更為祟厲以擾其家少選又曰汝若不見聽吾當請帝錮汝於石室中如止要冠珥袿𥜗之類翌日當與汝遂丁寧誡勵遣去明日遂具其所要洎楮鏹數十萬燔之城外女厲自兹不至牛後亦不知所在鬱林州推官崔迪其夕與牛同飲於薛氏之館目睹斯事畢道人畢水部田潭州人有季父幼嗜酒不治生嘗遊江湖間衣弊褐携一扇懷袖間置沙數合偶有所適則藉地取沙寫風雲草木蛟龍禽獸之字以扇扇之殆盡乃欣然而去嘗有買姓者過洞庭方離岸為暴風所漂幾至沉溺忽見一人循岸以扇招之入舟漸逼岸遂獲免賈德之默記其形狀及艤舟尋之不復見矣旬日賈到長沙偶於闤闠見之邀歸酣飲出金帛衣物為謝畢曰汝舟免溺余何力焉固辭不受強之乃取衣服數事旋以施貧者一無所留其後竟不知所在得之李林宗祕校假榖假榖者許州人纍舉進士家豐于財後忽如狂日夕冠幘衣布𫀆白銀帶行遊㕓市中謳吟云一間茅屋尚自修治信任風吹連簷破碎斗栱邪欹看看倒也每至倒也二字即連呼三五句方己墻壁作散土一堆主人永不來歸遇其出入則有閭巷小兒數十隨而和焉人以狂待之不以為異慶曆末病死權厝于野後數年營葬發視但空棺耳王允成承制在許州親見之方道士方道士失其名不知何許人隱于塗陽之西山磁州有護國靈應公祠每歲二三月天下之事神者四集所獻竒禽異獸巧工妙伎珍肴異果無所不有至期鄰郡之事本亡字人多會於祠下遊覽宴聚以至夏𥘉社人罷去乃歸方道士無歲不來常以九蒸黃菁以遺交舊一歲忽不至皆謂徙居他山或以為物故明年春城隍廟神座後有死人埃塵厚且寸餘官吏將檢視忽振衣而起乃方道士也復陪諸君酣飲月餘乃去自是不復來聞之學究向知古云髙閬髙閬蜀人也本姓向名良少為郡吏抵罪亡命遂易姓名焉雖眇一目而神檢高爽善詩來往江湖間深得養生之術飲酒至數斗不亂許郎中申為江東轉運使每按部必拉之同行嘗艤舟貴池亭有九華李山人者與高有舊因謁許延之使飲各盡二斗餘殊無醉態髙取釣竿謂李曰各釣一魚以資語笑然不得取蟹乃鈎餌投坐前甓罅中俄頃李引一蟹出高笑曰始約釣魚今果取蟹可罰以酒也後死於滁之琅琊山僧寺將終以玉笛授僧曰此開元中寧王所吹者然不知是否時已幾百歲矣許申孫子聞誨言孫鍇孫鍇不知何許人也祥符末嘗讀書於鎮州西山之書院一日採藥迷入深山見茅茨數間有道士據榻而坐孫再拜問歸路道士俾坐熟視曰窮薄人也今既遇我當使汝足於衣食既而與丹砂一塊如拳又授以一符曰可以召鬼及教以符傳本篆字謂曰今歲河朔大疫汝以此砂書符售之一符止取百錢不可過也召鬼之符止可一用蓋救汝之禍也再用則不靈汝其志之既出山鬻符于市果能愈疾鍇遂市一牛騎之戴鐡冠披絳服流轉至大名府時太尉王公嗣宗守魏擒而械于獄將以妖誕惑衆黥配之鍇謂獄官曰錯非造妖者間遇神人見教耳乞乘間白之言鍇能令人見鬼及其祖先王聞之乃曰昔劉根嘗有此術命釋縳試之果然遂送闕下輔司天監保章正專主符禁事後砂盡術衰遂逃去寶元中嘗詔天下捕之楊貫楊貫開封府寧陵縣人也嘗兩舉進士不預薦送即改業明法人或笑之曰我誦法令苟得入仕則官業己精熟矣一夕夢五色光來自西南入寢室光中有一道士叱貫令起謂之曰汝逮今三為人矣始為屠次為人女既笄而自縊今乃得為士人爾頂有戴笄頸有投繯之痕尚在可視也貫曰人之膚理萬狀安可便以屠者洎女子相誣乎道士曰爾以為不然耶遂懷中探一鑑令視之則鼓刀施朱之狀宛然貫即再拜謝又乞諭向去休咎道士曰爾夀過中年官至今丨既窹而大異之明年遂得明法出身治平二年調卭州録事參軍今沆州推官吕昭吉時任司寇屢與之飲數爵之後則頸上綆迹甚明詢其故貫具言夢之本末及披髮見肉胝圎五六寸若寠數然年逾五十授潞州潞城縣令到任而終張酒酒道士張酒酒失其名不知何許人天聖中主西都張水縣之天禧觀善􅺔鑑經其手則光照洞徹他工不可及或時童稚持鑑來治者遇醉則或抵破之或引之長三尺小兒驚呼乃笑曰吾與若戲乃取藥傳其上以敗氈覆之摩拭良久清瑩如故得錢唯買酒未嘗一日不醉一旦拂衣入王屋山立而尸解於藥匱山中始村人見有人立於岩石之上久而不去經旬往視之故在遂聞於鄉嗇夫就而察之乃一道士拱立且殭也嗇夫以為不祥推仆之邑尉撿視頂有一竅如雞卵大殊無血漬面色如生尉聞嗇夫推仆鞭之即瘞放於解化之地括異志卷苐七
