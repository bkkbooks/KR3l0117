front:
  text: 括異志卷苐八
  hash: sha256:fe05dd64f39357dd38c3fee2806b53e07dd249812644a59edc946a1f3ab11f00
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0117_SBCK_008-1a}
body:
  text: 襄國張師正纂明參政明參政鎬器識恢敏才學優贍第進士出入臺閣纍歷顯要慶曆中自京尹入參大政未久疽發于背遣使致祭于岱宗以祈冥祐使者馳至嶽廟祭訖是夜宿廟下睡中大厭從者呼覺曰夢神呼我立殿庭見百餘人擁一荷校者熟視乃參政也既而杖背二十驅出我不覺大呼遂奔騎而歸明已沉困召使者問祭之夜夢中奚覩具述所以明曰然又云明始病數日即似荒亂有郎官某人乃明之同年進士素相厚善明俾召至謂曰何以不來相視郎官曰比為參政暫請服藥假不意實抱疾耳明曰曽見無頭鬼語否郎官大駭曰豈未朝餐乎曰已食矣又曰豈未餌湯劑乎曰已屢進矣曰然則斯言何謂也明曰召同年正欲説此事又曰來矣可聽之郎官使聞如遊蜂蒼蠅鳴地下明曰語乃胸中出向者妖賊據甘陵奉朝命攻討外圍既固攻具備設平在旦夕不意文相國來撫師將坐而收功心實忿之遂妄殺數人今實稱冤於我病其不起乎數日遂卒夫為將三世道家所忌謂攻城野戰玉石難分耳明以已之私忿殺無罪者宜乎見厲於垂死嗣續汩而不振也徐學士熙寧中徐學士禧始受職官中書習學公事自豫章侍親之闕下舟行次彭蠡湖昧爽而行期早抵南康軍俄而水面白霧四起始慮風作促舟人疾棹未四五里霧稍開見二朱漆萬斛巨艦旌旗赫奕搖櫓者肅而不譁相去百餘丈東南而逝未二三里又見朱艦間以金碧幡斾尤鮮華亦相踵而去少時又逢二白艦載甲士數千戈戟森列尾三舟而行徐之舟人既見俯不敢正視然望其船逺而益小洎抵他岸皆若一履宫庭湖庿水經具載其靈近傳有小龍者多出處其中豈其靈變耶徐學士嘗言魚中丞中丞魚公周詢天聖四年第進士甲等𥘉命大理評事知濟州金鄉縣嘗晝卧書閣中有守閣老卒入白事但見烏蛇蟠於榻矯首冠幘叱聲甚厲卒走出呼侍吏共視之乃見熟寢未窹後至御史中丞而卒張都官居方云祖龍圗祖龍圗無擇始登第倅通齊州歲餘得告歸蔡州營葬事畢復任後春季檢視官物于禹城縣過石河灘沙中得片石上有數十字乃葬其先君之志也遣人視墳壠無一抔之缺竟不測其所從來范郎中徽之言尚寺丞司勳外郎尚公霖祥符末以殿中丞知夔州巫山縣有尉李某者山東人頗幹敏一旦疾病尚聞其委頓日往臨問曰萬一不起可以後事告也尉曰碩以老母幼女為託公儻垂仁惻某雖死敢忘結草之義乎尚泫然愍之既死出俸錢送其母及骨函還鄉里嫁其女於士族一夕夢李如平昔拜且泣曰某懇求於隂官今得為公之子以此為謝耳是月邑君妊娠明年解官沿流赴闕或遇灘險隱約見尉在岸上指呼將抵荆渚又夢李報曰某明日當生府中必送一合來宜收之翌日果誕一男子府尹以合貯粟米遺尚曰聞邑君育子以為糜粥之具因字頴曰合兒頴性純厚敏於行而篤於學官至大理丞張稚圭説髙舜臣大丨名府進士髙舜臣嘗言其徔兄祥符中為衙校董卒數百人伐木於西山一日入山督役迷路聞樂聲合作於山谷間尋聲視之見婦人數十衣服華麗執笙竽會飲于磻石上居席首者召高坐其側亦及以酒肴謂曰吾欲婦汝何如髙但愧謝又曰汝今歸寨中吾將繼至是夜果往髙亦恍然不測自此遇夜即至室中帳㡩枕褥之具備設曉復失之若此者逮一月役兵取材既畢與高同歸高之父母聞之大驚曰此子為石妖木魅所惑也因即東廡而居家人視之則裝寢之具冠衣之類悉已張陳高氏家人亦罕見其面或見其冠珮或見其裙𥜗而已家屬相與憂懼慮久而致丨􅍔乃召巫覡具符水禳詛之術女子笑謂高曰我豈妖怪害人者何見疑之深也儼然殊不顧高氏家亦無奈之何居半歲高氏會客烹牛為饌女子見而大駭曰我以君積善之家故碩奉巾櫛於子亦將福汝家不意暴惡之如是君家固不當留亟送我歸也高白其父母聞而大喜立俾其子送之去西山數舍其夜不至高亦不敢復前但望山悵恨而歸髙氏子竟亦無恙大名進士陳倫因言神怪而及之亦未以為信治平𥘉豫為大名鈐兵進士王詹亦道其事與陳説正同舜臣後以纍舉推恩得州長史王慶諸司副使王慶皇祐中差知豐州性剛暴刻而少恩一日視事忽覺頭昏痛不可忍捫其首生兩角僅二寸許數日大呌而死有李顓者景𥘉登進士苐性豪蕩不檢邢州觀察推官病疫死既斂其頂髮如珠有二角長一寸餘左藏朱允中大邑主簿王綱言孫翰林慶曆中楊內翰偉郡封坐堂上見一老嫗蓬鬢敝衣徑入子舍詢何之不應頃之復出語云郎君教我來老息婦不敢自專遽呼左右逐之出中閫即不見乃召子婦詰之云老嫗言來日郎君欲就息婦房中宴飲方責其妄語即便走出舉家驚愕翌日宅中濃霧昏塞子舍尤甚辛螫口鼻不可嚮邇門闔不能開久之聞語笑歌管之聲自辰至申昏霧漸釋排户而入詢其所以云有一少年與我歡飲器用珍麗筵設華煥飲饌音樂無不精美我亦忘身為楊氏婦也然精神頗亦失常即召劉捉鬼者禁劾之不能已聞翰林孫郎中專主符禁亟俾視之曰此鬼庿在東南三十里將為神矣何敢為如此事遂書二符致婦寢室之門又曰知某今日到宅明日定不來更一日必至宜令其夫洎女使二三人守之鬼若不得入婦室當變怪于外蓋欲誘之出也出則不可治矣越一日果至雖昏霧如𥘉獨不入子舍俄而郡封中惡婦欲奔視制之不得出少時霧氣解散郡封亦復故孫乃與楊公假靜宅作壇奏章自兹不復來孫云已囚海上石室矣慶州察推張偉嘗言之黃遵黃遵者家興國軍性踈放頗知書而能丹青善傳人之形神曲盡其妙事母篤孝凡得畫直未嘗私畜供甘旨外悉歸於母慶曆中遵忽感疾而死凡三日心尚暖母不敢斂是夕遵復蘇家人扶坐問皆不語遽索紙筆圗一人形容良久乃語始入一公府見廊廡肅靜皆垂簾閽吏通曰興國軍黃遵今追到有吏問遵曰爾黃遵耶遵曰準前謂吏曰遵未嘗有過何以見吏曰爾算盡乃至此遵方知身死遂號泣拜曰母老無兄弟乞終母夀吏曰此不敢與聞遵拜泣不巳吏哀其誠乃曰俟主者來若自告之移刻兩廡吏喧然曰至矣一吏升堂軸簾東北隅有户洞開朱吏數人前導見一人紫衣金帶者升堂坐諸吏僅百人列階下致恭畢分入諸局始見領數十人荷校者露首者至紫衣前訊訖驅出巳而呼遵問里閈姓名遵號慟叩頭拜曰念母老無兄弟遵若死母必餓殍乞終母夀遵叩階額血濺地紫衣顧左右索籍視之久乃謂曰汝母夀尚有十餘年念爾至孝許終母夀紫衣以筆注其籍命左右速奏覆遵拜而出復呼之命俯階戺問曰汝在人間與人傳神者是乎遵曰愚昧無能僅成其形耳又曰爾識我否遵曰凡目豈識神儀曰我乃人間所謂崔府君也爾熟視吾貌歸人間寫之然慎勿多傳若所傳惟肖恐人間祭祀不常返昏吾慮記之勿忘自後遵在興國凡所寫者三本正一畫於地藏院二為好事者所取厥後十年母以夀終既葬服除遵一日遍辭親識因大醉數日而卒前進士朱光復嘗逰興國軍熟知其事劉德妙寶元中夏英公為陜西路安撫招討使駐兵鄜畤嘗與僚屬言向自知制誥出守安陸郡有羇管婦人劉德妙言事頗中因呼而問之爾有何能為丁晉公所知劉曰某本捧日軍之營婦也嘗出詣親家憩于汴上柳隂忽一人巾幘紫𫀆就巳而坐云是扶溝縣録事有事之府溺水而死訴于隂官俾我復生至則身巳壞然尚得處於陽間今欲憑附于汝我能知人未萌之休咎言既驗人必以愍謝汝若事我以此為報某懼不敢答洎歸鬼亦隨至他人不見也夫亦不信則夫婦皆苦寒熱嘔泄不得巳事始則火伍中人來占事悉驗俄而里巷皆知既而公卿之家呼召相繼晉公不欲營婦出入卿相之門遂度為女冠丁公南遷某亦連坐編致斯郡實無他術但萌于心則鬼知之夏曰吾心有一事爾知之否劉曰知之但乞先書而糊其外方敢言也某是時苦家貧干執政求知益州遂屏左右書畢封置于案劉言如所書仍云事亦不諧既而果然弔榷酒於雕隂具聞其説稅道士景祐中利州道士稅某善妖幻洎符禁之術利之冨民或有所求不與者即為壇於密室置大桶於前𬒳髮仗劒追其魂神入桶覆之以石其人乃病然後假以符水或祠醮謝以財乃去石遣之其人遂愈市井有鬻籠餅洎諸肉者求之即愈不爾遂化為白鴿飛去或即蟲出利人皆神而畏之嘗怒一僧遇野外作法叱之僧足如植手亦不能舉恣行鞭箠僧密訟于官命賊曹擒捕先沃以犬彘之血術無所施獄具遂斬于市寇萊公寇忠愍𥘉登第授大理評事知歸州巴東縣時唐郎中渭方為郡夕夢有告云宰相至唐思之不聞有宰相出鎮者晨興視事而疆吏報寇廷評入界唐公驚愕出郡迓勞見其風神秀偉便以公輔待之仍出諸子羅拜唐新飾韀靮致廳之左寇既歸其子拯白其父曰適者寇屢目此宜即送之寇果詢牙校何人知我欲此遂對以十四秀才既而力為延譽拯於孫漢公榜等甲成名魏進士建州進士魏某者冨有詞學履行溫愍家亦頗豐天聖中屢冠鄉書既預計偕夢一衣緋衣人命徒執之棄市始謂必捷科苐既而不利於春闈凡三舉皆然後歸卿閭有鄰里少年對語不遜因掌之即仆地死警卒捕送于官時裴郎中守是郡聞其學行為衆所丨推欲骫法脫之闔郡官吏亦為之言而魏白郡守曰某殺人償死職也安敢仰纍明公某三預薦書必夢緋衣人命徒執赴市就刑今明公姓裴乃緋衣也某邂逅一掌致人於死市死乃前定也將刑一郡士庶無不為之嗟惜管師復言德州民德州德平縣民某氏者父子數人耕田甚力家頗豐厚其弟素貧傭以養母兄未嘗有甘旨之助也慶曆中新搆瓦室三楹所居前後植栁數百株枝如拱把一夕大雷電野又數頭相逐繞其居折柳盡髠牙擊屋瓦明日視之無一瓦全者泥淖中足迹長二尺餘柳棓悉長三四尺皮盡剝瑩滑如削逺近居民悉取而藏之豫嘗親至平原人説如此亦見其所折柳枝括異志卷苐八
