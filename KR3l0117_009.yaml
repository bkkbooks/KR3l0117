front:
  text: 括異志卷苐九
  hash: sha256:4f5fddbd809f0980f6d46c78849d8ecd7723332a127ef0bbcbaa52218548a88c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0117_SBCK_009-1a}
body:
  text: 襄國張師正纂毛郎中毛郎中晦熙寧𥘉年惟一妻一子處家于荆州常有一女厲朝夕在其家語言厯歷可辨自稱田芙蓉家人出入動靜無不察也言與邑君有宿冤或問何不遂報之渠尚有數年壽耳然所須之物往往應索而至久之厭苦邑君謂曰吾為汝修功果能他適乎鬼曰善因賂二僧俾誦佛書具疏燔之鬼去數日復來曰僧之誦經妄矣止誦一卷餘則未嘗讀也是以復來詰其僧果然鄰家毀之曰此邪魅也何足畏鬼大罵發其帷幕之私曰此乃邪爾常曰我今往瓦市逰看毛密遣僕使探其伎藝者歸而詢之一皆符合其後毛之子中庸調輔永之祈陽簿舟行次石首縣鬼繼至曰解纜何故不相告俾我晝夜奔赴百餘里足今趼矣至零陵二歲邑君卒鬼自是而絶余在荆州親見崔禹臣崔禹臣熙寧𥘉以職官知濰州北海縣冬夜坐書閣中窗外有小圃聞若環珮聲又如往來誦佛書者月色微亮穴窗視之見一物長七尺餘周身白毛熠耀口中咄咄不己遽呼從人擒之乃鬼也面􅉳髮蓬身縈藻荇氷乳四垂行則丁冬遂以挺驅之大呼曰我為若有災來此念經消禳何謂捶我也即命左右互以巨撾痛擊終不能斃刃之不傷火之不灼但覺縮小長三尺許遂錮縳既曉投之大水良久躍高丈餘己復如舊少選遂沒是年崔以公事失官崔亦自有傳陳向祕丞言張郎中張郎中薦髙密人登明經苐山東風俗遇正月取五姓處女年十餘歲者共卧一榻覆之以衾四面以箕扇之良久有一女子如夢寐或若刺文繡或若事筆硯或若理管絃俄頃乃寤謂之扇平聲天卜以乞巧薦有女十餘歲因卜有一仙女日來教之遇其去即留一女童為伴他人弗見自此凡女工音律書札不學而自能歲餘女晝寢忽驚呼而覺曰仙女今日上天赴會令我與童子偕在園中嬉逰園有一井覆以巨石戒童子曰勿令此女窺井也仙女既去我遂發石觀之見群鬼異形怪狀攀緣爭出我驚呼童子遽取棓亂捶鬼復入取石窒之自此仙女怒而去既笄而嫁生數子先君與薦善熟聞其事張司封建州有張氏夫婦俱四十餘無子居近城隍廟屢禱於神以求繼嗣歲餘夢神告曰汝夫婦分當無子我念汝告禱之虔今以廟中判官與若為嗣既而其妻妊娠生一子名伯玉苐進士舉書判拔萃歷臺省仕至主爵正郎典數郡而卒其才藻廉徑為當世所尚而嗜酒不修飾垢貌蓬鬢如土偶判官焉薛比部薛比部周至和中以殿中丞知益州成都縣其妻卧疾二婢致藥以殺之薛執二婢送官劾之伏罪一婢妊娠己數月薜以牒訴其詐遂俱就戮既而婢與所妊之子形見其室訴于薛曰兒不當死何以枉害我晝夜聆其語然家有吉凶鬼亦以報薛後監鳯翔府太平宫則鬼不至他所則來嘉祐中薛自尚書外郎出典涪州行至始平縣鬼曰公將死無用往即乞分司歸長安不逾年遂卒評曰父母殺子於官理置而不論矧在胞中形氣未具者乎而遽有冤死之訴豈釋氏所謂冤宿世者如是耶張靖學士云陳良卿進士陳良卿景祐四年自永州隨鄉書赴禮部試十月至長沙夢一人引導入巨艦中見一道士自稱清精先生與之談論辭語髙古而義理邃慱謂陳曰吾己薦子於堯為直言極諌陳曰堯今何在曰見司南嶽陳曰堯乃古聖君也安可在公侯之列先生曰堯人間之帝也秉火德而王棄天下而神位乎南方子何疑焉陳辝以名宦未立俟他日應乃許以十年為期既寤甚惡之為異夢録以自寬明年登甲第調全州判官道出嶽州南一驛偶晝寢夢使者持檄來召遽驚覺喟曰豈堯命乎同行相勉以夢不足信復執書帙卧讀之晚食具呼之己卒矣夢中約以十年乃自得夢至卒正周十月耳豈鬼神不欲明言以一月為一年乎羅著作著作羅紹漢陽人居府五通神祠其鄰家歲畜一豕以為祀神之具豕無欄豢多壞羅之藩籬入其宅且穢汚之羅屢誡其鄰殊不少聽紹父擒其豕截去一耳鄰人見之不勝其憤曰夕訴於神且云此豕本是神所享今為羅某所損歲己乏祀願神速報之既而生紹與其弟各無一耳余親見之五通神能禍福於人立有應驗其可駭哉紹進士及苐終著作佐郎云又公安冨民鄧氏者少時因見二犬交即戲以刃斷其勢後生二子俱閹𥘉為荆南牙校其狀貌真閹也事與羅紹相近故附之辛都官子言録陸長緒目録作長孺陸長緒吳郡人第進士以職官知襄州榖城縣其為政務疾惡而遂至外暴察苛急視群吏若仇讐朴撻殆無虛日一日晚坐􅈦戺有黑犬自門直入怒目狂吠躍而升􅈦陸號呼群吏競持挺逐之入吏舍忽不見既而陸妻死遂百鬼進其舍陸子幼有數婢往往白晝見少年入婢室陸大怒縳群婢搒掠至髠釱烙炮以訊其姦而終不得狀又堂前舊作盆池植蓮一日盆出於外而無發掘之迹遽命埋之越宿復然陸自臨視照水見其形冠服非常而立侍皆群鬼陸大怖又有聲於梁棟間漸與陸語索紙作詩始見數字在紙每讀畢一句則一句出而前句旋滅其語大略皆譏戲陸也如是二年解官怪始絶長緒自為人言如此寇侍禁寇侍禁立嘗為三司大將與同列李某者皇祐中部督香藥往廣信軍納畢回京宿于定州永樂驛之堂時若寒乃熾炭炷燈擁爐而坐夜將二鼓李某先寢堂後􅊯􅊯然如小豚相逐亦不以為異俄頃門轟然大闢一媪長二尺許蓬鬢傴僂而前以口噓燈熖碧而將滅寇大驚以杖擊之媪走寇逐之顙抵門扉偃仆于地即開堂之前門將走外廳呼其從者忘廳後之有屏也頭又觸之而踣因大呼驛吏與僕厮秉火而至見寇顙破血流燈檠且折門閉如故李以𬒳蒙首伏床下詢之驛吏云嘗有斯祅出自堂後古城小穴中寇自説如此耳張尚書張尚書存兾州人家冨于財䇿進士第纍歷臺省館閣清要之職致政歸鄉閭一夕圉人見一犢盜食馬粟逐而捶之但見白光奔宅門遂失之門閉如故翌日張病肌骨痛者數日間䇿杖詣馬廏問圉人云旬日前夜見何物圍人曰見一犢竊啖馬粟擊之化為白光而去張曰後或見不可擊也圉人頗疑之歲餘病亟閽者見一犢自宅門出追視乃不見俄聞宅中哭乃尚書也朱左藏允中言薑定國高密薑定國業九經一夕寢于家孰夢二人身長而貌狠怒氣勃勃然謂定國曰吾身長丈八可殺汝可噬汝定國驚魘號呼拒之而退明夜復夢如𥘉大懼乃徙其寢具與門下客同榻客取刀斷之少頃一蛇復至客又殺之明日度二蛇果長三尋定國後登九經苐今為幕職官聞之吉推官仲容傳文秀禮賔副使傅公文秀嘗自京挈家歸鳯翔府陽平鎮之故居既而其兄之女為物所慿暮則靚妝麗服處帷帳中切切如與人語家人問之不對若是者殆半歲郿有善制鬼者羅禁以其能符禁鄉人呼為羅禁傅召使視之遂以法劾其女乃云吾韓魏公之子也昔侍父鎮關中以病死于長安驛舍昨日傅族經由恱其女美因而壻之羅再三訊詰辭頗屈伏遂去後數夜號呼於堂下曰汝雖絶我婚當歸吾子也再飲之以藥下塊肉如拳自此不復至董職方經臣言胡郎中胡郎中楷慶曆中偶會於真州嘗言有親舊赴官湖湘舟行至鄂嶽間舟忽不進舟人亦無以施力其人焚香奠酒披秉再拜懇誠以禱良久舟突然而逝他船見其舟後有枯木查牙躍高數丈復沉于水不知何物豈蛟龍之變化乎僧行恱長白山醴泉寺乃景德寺西禪院之下院也歲久頽圯僧行恱志欲營葺因靈市岩川董將軍莊大木百餘章有大榆其上巨枝岐分向因雷雨枝間有大足迹長僅二尺僧伐視之上下如一因斷為數十百片俾其徒偽稱佛所踐履持之化誘諸郡三歲得錢五千萬寺宇一新頗極壯麗事在天禧中李省山人目覩評曰佛之徒以因果􅍔福恣行誘脅持元元死生之柄自王公而下趨向者十八九恱又能假詭異之迹俾夫庸者破帑傾篋而甘心焉嗚呼人之好怪也甚矣康定民康定軍未建時古城卑缺人得而踰有邑居王某與北郊村民聮親景祐五年秋村民為子娶婦王赴其花燭中夜二姻家交爭紛然王不喜遂於厨中得㸑餘柴枝長三四尺持之以歸時月色微明行二三里過古道有小兒約十數歲遽來持王衣𥚑啼哭不已問其家亦不答乃力解其手未數步又來相逐遂以所持柴枝擊之即仆地不聞鼻息王默念曰兒定死大懼又慮路人見而迹露乃疾走踰毁垣而入翌日不敢出門恐官捕殺人者曰既高不得出里巷伺探消息寂爾不聞遂由舊路覆其事惟見一朽腐棺板長三尺餘中微骨折尚有火煤之迹其古道左右皆土崖髙五六仞居民多穴之以瘞小兒蓋遊魂慿而為變耳鄭前治平中武昌縣令鄭前嘗覺腠理不寧晝寢曲室夢一老父古衣冠揖鄭曰君小疾煮地骨皮湯飲之即愈鄭曰素不奉展何故至此云我西漢時與君嘗聮局事君已為三世人我尚留滯幽壞即詢其名氏云前將軍何復或欲尋吾所居可來費家園也臨别口占詩一絶云與子相逢西漢年半成枯骨半成煙欲知土室長眠處門有青松澗有泉鄭官滿之鄂渚遊頭陀寺山下城小路見叢薄蔚然問寺僧乃費家園也道次有斷碑字已漫滅惟有何復字可辨冡前有澗水洎老松數株王承制允成時為巡具知之陳州女厲慶曆皇祐中陳州通判廳夜有婦人嘗出與人笑語或見其狀頗美詢其名氏曰我孔大姐也本石太尉家女奴以過𬒳殺問何不他適云此中亦有所屬安得自便耶時晏相國鎮宛丘屢倚新聲作小詞未出鬼即嘔唱於外或早暮人有登廳戺忽於掖下作大聲人恐悸則笑有市買卒時𬒳驚喪所持甚苦之遂常以刀自隨後復來驚隨聲斫之數夕但聞呻吟曰聊與汝相戲何故傷我如是自此遂絶括異志卷第九
