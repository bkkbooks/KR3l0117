front:
  text: 括異志卷苐九
  hash: sha256:4f5fddbd809f0980f6d46c78849d8ecd7723332a127ef0bbcbaa52218548a88c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0117_SBCK_009-1a}
body:
  text: 襄國張師正纂毛郎中毛郎中晦熈寜𥘉年惟一妻一子䖏家于荆州常有一女厲朝夕在其家語言厯歴可辨自稱田芙蓉家人出入動静無不察也言與邑君有宿冤或問何不遂報之渠尚有數年壽耳然所須之物徃徃應索而至久之厭苦邑君謂曰吾為汝修功果䏻他適乎鬼曰善因賂二僧俾誦佛書具䟽燔之鬼去數日復来曰僧之誦經妄矣止誦一卷餘則未嘗讀也是以復来詰其僧果然鄰家毀之曰此邪魅也何足畏鬼大罵發其帷幕之私曰此乃邪爾常曰我今徃瓦市逰看毛宻遣僕使探其伎藝者歸而詢之一皆符合其後毛之子中庸調𥙷永之祈陽簿舟行次石首縣鬼継至曰觧䌫何故不相告俾我晝夜奔赴百餘里足今趼矣至零陵二歳邑君卒鬼自是而絶余在荆州親見崔禹臣崔禹臣熈寜𥘉以軄官知濰州北海縣冬夜坐書閤中窓外有小圃聞若環珮聲又如徃来誦佛書者月色微亮穴窓視之見一物長七尺餘周身白毛熠燿口中咄咄不己遽呼從人擒之乃鬼也面􅉳髪蓬身縈藻荇氷乳四垂行則丁冬遂以挺敺之大呼曰我爲若有災来此念經消禳何謂捶我也即命左右互以巨撾痛擊終不䏻斃刃之不傷火之不灼但覺縮小長三尺許遂錮縳旣暁投之大水良乆躍高丈餘己復如舊少選遂没是年崔以公事失官崔亦自有傳陳向秘丞言張郎中張郎中薦髙宻人登明經苐山東風俗遇正月取五姓䖏女年十餘歳者共卧一榻覆之以衾四面以箕扇之良乆有一女子如夢寐或若刺文繡或若亊筆硯或若理管絃俄頃乃寤謂之扇平声天卜以乞巧薦有女十餘歳因卜有一仙女日来教之遇其去即留一女童爲伴他人弗見自此凢女工音律書札不學而自䏻歳餘女晝寝忽驚呼而覺曰仙女今日上天赴㑹令我與童子偕在園中嬉逰園有一井覆以巨石戒童子曰勿令此女窺井也仙女旣去我遂發石觀之見群鬼異形怪状攀縁争出我驚呼童子遽取棓亂捶鬼復入取石窒之自此仙女怒而去旣笄而嫁生數子先君與薦善熟聞其事張司封建州有張氏夫婦俱四十餘無子居近城隍廟屢禱於神以求継嗣歳餘夢神告曰汝夫婦分當無子我念汝告禱之䖍今以廟中判官與若爲嗣旣而其妻妊娠生一子名伯玉苐進士舉書判㧞萃歷臺省仕至主爵正郎典數郡而卒其才藻㢘勁爲當世所尚而嗜酒不修飾垢貌蓬髩如土偶判官焉薛比部薛比部周至和中以殿中丞知益州成都縣其妻卧疾二婢致藥以殺之薛執二婢送官劾之伏罪一婢妊娠己數月薜以牒訴其詐遂俱就戮旣而婢與所妊之子形見其室訴于薛曰兒不當死何以枉害我晝夜聆其語然家有吉㐫鬼亦以報薛後監鳯翔府太平宫則鬼不至他所則来嘉祐中薛自尚書外郎出典涪州行至始平縣鬼曰公将死無用徃即乞分司歸長安不逾年遂卒評曰父母殺子於官理置而不論矧在胞中形氣未具者乎而遽有冤死之訴豈釋氏所謂冤宿世者如是耶張靖學士云陳良卿進士陳良卿景祐四年自永州隨郷書赴禮部試十月至長沙夢一人引導入巨艦中見一道士自稱清精先生與之談論辭語髙古而義理邃慱謂陳曰吾己薦子於堯為直言極諌陳曰堯今何在曰見司南岳陳曰堯乃古聖君也安可在公侯之列先生曰堯人間之帝也秉火徳而王棄天下而神位乎南方子何疑焉陳辝以名宦未立俟他日應乃許以十年為期旣寤甚悪之為異夢録以自寛明年登甲第調全州判官道出岳州南一驛偶晝寝夢使者持檄来召遽驚覺喟曰豈堯命乎同行相勉以夢不足信復執書帙卧讀之晚食具呼之己卒矣夢中約以十年乃自得夢至卒正周十月耳豈鬼神不欲明言以一月為一年乎羅著作著作羅紹漢陽人居府五通神祠其隣家歳畜一豕以為祀神之具豕無欄豢多壊羅之藩籬入其宅且穢汚之羅屡誡其隣殊不少聽紹父擒其豕截去一耳鄰人見之不勝其憤曰夕訴於神且云此豕本是神所享今為羅某所損歳己乏祀願神速報之旣而生紹與其弟各無一耳余親見之五通神䏻禍福於人立有應驗其可駭哉紹進士及苐终著作佐郎云又公安冨民鄧氏者少時因見二犬交即戯以刃㫁其勢後生二子俱閹𥘉為荆南牙校其状貌真閹也事與羅紹相近故附之辛都官子言録陸長緒目録作長孺陸長緒呉郡人第進士以軄官知襄州榖城縣其為政務疾悪而遂至外暴察苛急視群吏若仇讐朴撻殆無虚日一日晚坐􅈦戺有黒犬自門直入怒目狂吠躍而升􅈦陸號呼群吏競持挺逐之入吏舍忽不見旣而陸妻死遂百鬼進其舍陸子㓜有數婢徃徃白晝見少年入婢室陸大怒縳群婢搒掠至髠釱烙炮以訊其姦而終不得状又堂前舊作盆池植蓮一日盆出於外而無發掘之迹遽命埋之越宿復然陸自臨視照水見其形冠服非常而立侍皆群鬼陸大怖又有聲於梁棟間漸與陸語索紙作詩始見數字在紙每讀畢一句則一句出而前句旋滅其語大畧皆譏戯陸也如是二年觧官怪始絶長緒自為人言如此㓂侍禁㓂侍禁立嘗為三司大将與同列李某者皇祐中部督香藥徃廣信軍納畢回京宿于定州永樂驛之堂時若寒乃熾炭炷燈擁爐而坐夜将二皷李某先寝堂後􅊯􅊯然如小豚相逐亦不以為異俄頃門轟然大闢一媪長二尺許蓬髩傴僂而前以口嘘燈熖碧而将滅㓂大驚以杖擊之媪走㓂逐之顙抵門扉偃仆于地即開堂之前門将走外㕔呼其從者忘㕔後之有屏也頭又觸之而踣因大呼驛吏與僕厮秉火而至見㓂顙破血流燈檠且折門閉如故李以𬒳蒙首伏床下詢之驛吏云嘗有斯祅出自堂後古城小穴中㓂自說如此耳張尚書張尚書存兾州人家冨扵財䇿進士第累歴臺省館閣清要之軄致政歸郷閭一夕圉人見一犢盗食馬粟逐而捶之但見白光奔宅門遂失之門閉如故翌日張病肌骨痛者數日間䇿杖詣馬廏問圉人云旬日前夜見何物圍人曰見一犢竊㗖馬粟擊之化為白光而去張曰後或見不可擊也圉人頗疑之歳餘病亟閽者見一犢自宅門出追視乃不見俄聞宅中哭乃尚書也朱左蔵允中言姜定國高宻姜定國業九經一夕寝于家塾夢二人身長而貌狠怒氣勃勃然謂定國曰吾身長丈八可殺汝可噬汝定國驚魘號呼拒之而退明夜復夢如𥘉大懼乃徙其寝具與門下客同榻客取刀断之少頃一虵復至客又殺之明日度二虵果長三尋定國後登九經苐今爲幕軄官聞之吉推官仲容傳文秀禮賔副使傅公文秀嘗自京挈家歸鳯翔府陽平鎮之故居旣而其兄之女爲物所慿暮則靚妆麗服䖏帷帳中切切如與人語家人問之不對若是者殆半歳郿有善制鬼者羅禁以其能符禁郷人呼爲羅禁傅召使視之遂以法劾其女乃云吾韓魏公之子也昔侍父鎮關中以病死于長安驛舍昨日傅族經由恱其女美因而壻之羅再三訊詰辭頗屈伏遂去後數夜號呼於堂下曰汝雖絶我婚當歸吾子也再飲之以藥下塊肉如拳自此不復至董軄方經臣言胡郎中胡郎中楷慶暦中偶㑹於真州嘗言有親舊赴官湖湘舟行至鄂岳間舟忽不進舟人亦無以施力其人焚香奠酒披秉再拜懇誠以禱良乆舟突然而逝他船見其舟後有枯木查牙躍高數丈復沉于水不知何物豈蛟龍之變化乎僧行恱長白山醴泉寺乃景徳寺西禅院之下院也歳乆頽圯僧行恱志欲營葺因靈市岩川董将軍荘大木百餘章有大榆其上巨枝岐分向因雷雨枝間有大足跡長僅二尺僧伐視之上下如一因断為數十百片俾其徒偽稱佛所踐履持之化誘諸郡三歳得錢五千萬寺宇一新頗極壮麗事在天禧中李省山人目覩評曰佛之徒以因果􅍔福恣行誘脅持元元死生之柄自王公而下趋向者十八九恱又䏻假詭異之迹俾夫庸者破帑傾篋而甘心焉嗚呼人之好怪也甚矣康定民康定軍未建時古城卑缺人得而踰有邑居王某與北郊村民聮親景祐五年秋村民為子娶婦王赴其花燭中夜二婣家交争紛然王不喜遂於厨中得㸑餘柴枝長三四尺持之以歸時月色微明行二三里過古道有小兒約十數歳遽来持王衣𥚑啼哭不已問其家亦不荅乃力觧其手未數步又来相逐遂以所持柴枝擊之即仆地不聞鼻息王黙念曰児定死大懼又慮路人見而迹露乃疾走踰毁垣而入翌日不敢出門恐官捕殺人者曰旣高不得出里巷伺探消息寂爾不聞遂由舊路覆其事惟見一朽腐棺板長三尺餘中微骨折尚有火煤之迹其古道左右皆土崖髙五六仞居民多穴之以瘞小兒盖游䰟慿而為變耳鄭前治平中武昌縣令鄭前嘗覺腠理不寕晝寝曲室夢一老父古衣冠揖鄭曰君小疾煮地骨皮湯飲之即愈鄭曰素不奉展何故至此云我西漢時與君嘗聮局事君已為三世人我尚留滯幽壞即詢其名氏云前将軍何復或欲尋吾所居可来費家園也臨别口占詩一絶云與子相逢西漢年半成枯骨半成煙欲知土室長眠䖏門有青松澗有泉鄭官滿之鄂渚遊頭陀寺山下城小路見叢薄蔚然問寺僧乃費家園也道次有断碑字已澷滅惟有何復字可辯冡前有澗水洎老松數株王承制允成时為廵具知之陳州女厲慶曆皇祐中陳州通判㕔夜有婦人嘗出與人笑語或見其状頗美詢其名氏曰我孔大姐也本石太尉家女奴以過𬒳殺問何不他適云此中亦有所属安得自便耶時晏相國鎮宛丘屢倚新聲作小詞未出鬼即嘔唱於外或早暮人有登㕔戺忽於掖下作大聲人恐悸則笑有市買卒時𬒳驚䘮所持甚苦之遂常以刀自隨後復来驚隨聲斫之數夕但聞呻吟曰聊與汝相戯何故傷我如是自此遂絶括異志卷第九
