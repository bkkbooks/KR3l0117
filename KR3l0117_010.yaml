front:
  text: 括異志卷苐十
  hash: sha256:099b588aa6b065ac4407c4d0f54db2d6eb031a599c9e44beb0d02796dc1e364a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0117_SBCK_010-1a}
body:
  text: 襄國張師正繤鍾離發運鍾離瑾開寶間宰江州之德化明年將以女歸許氏居一曰諭其胥魁俾市婢以送女翌日胥與老嫗引一女子來問其何許人嫗曰撫之臨川人也幻喪其親外氏肓之女受嫗戒亦不敢有他言君視事少間歸遇于屏是女流涕有戚容且疑其家叱罵詰曰不然某之父昔曽令是邑不幸與母俱喪無親戚以為依時方五歲育於胥家十年矣且將為己女今明府欲得媵妾胥與嫗以某應命適見明丨府視事追感吾父不覺涕零君大驚呼胥嫗以審如女言誡家人易其衣食如己所生以書抵許氏告緩期姑將輟吾女之資以嫁焉許亦惻然復曰君侯獨䏻抑己女而拔人之孤女豫固有季子碩得以為婦安事盛飾哉卒以二女歸許氏久之君夢一緑衣丈夫造庭拜而謝曰不圗賤息辱賜於君然得請於帝碩奉十任有土官故來致命後果歷十郡太守終於江淮發運使今鍾離氏有仕籍於朝常十餘獨出君之後故世為肥之冠族若許之名爵父老已失其傳嗚呼二君之用心非有求於世者特發諸至仁耳彼附貴而親靦然自以為得獨何人哉施報之事儒者蓋鮮言若蛟龍斷蛇杜回結草千古豈苟傳亦有以警勸云蔡侍禁蔡侍禁者故參知政事文忠公之近屬也景祐中常為京城西巡檢一日冠帶坐㕔事有緑衣蒼頭展刺云郎君奉謁旋見一少年狀貌如十五六人衣淺黃衫玉帶紗帽升階拜伏自稱郎君云前生與兄為昆弟固請納拜蔡知其異不得已受其禮與之偶坐凝定神思拭目熟視之曰郎君必天地間貴神也何故惠然相過曰先居安上門譙三十年今期滿為皇城司主者所遣故詣兄求一居止之所蔡曰某之𪠘宇湫隘豈堪郎君之處也即詣西廡下貯蒿秸之室曰乞糞除之𥙷隟封户得此足矣乃辭去蔡亦僶俯令從者潔其室而扃鎖焉少時有虹梁自東南抵室門而止驢駕槖駝負載巨槖者罔知其數復有金飾犢車垂珠簾張青蓋者數十乘又有衣錦𫀆屬槖鞬而騎者執撾而趨者左右前後亦數千人有伶人百餘衣紫緋緑𫀆奏樂前導郎君者乘馬按轡徐行其後又有臂鷹隼率獵犬洎四夷之人數百偕入於室中大抵類車駕之儀仗他人弗之見也俄頃郎君復至叙謝再三幸得居此必無絲毫奉擾苟有凶吉謹當奉報但勿令家人穴壁竊覘或要相覿冝焚香密啓即至矣言訖不見蔡氏舉族大恐怖雖白晝不敢正視其室月餘寂無他怪間聞合樂聲如聞風傳自逺而至者自此差不懼蔡之細君由隟窺之見郎君者乘步輦擁姬侍數百皆有殊色樓觀壯麗池館邃袤若宫室然蔡有男卒已十餘年亦侍其側因燔香己告郎君即至曰嫂何為者對以求見亡男曰嫂子在郎君處甚樂無用見恐因驚而他適則有所苦􅈤告以母子之情呼出母見即大慟急就之遂滅去嘆曰果驚去矣又數月遇蔡誕辰贄紈素數匹以為夀舉視之若煙綃霧縠又如以蛛絲組織而成固非女工之所䏻杼軸也逮半歲來告曰兄已授明越巡檢明日宣下今先兄往彼擇閴室而上焉揚子江神相與素善恐知是親戚故起風濤相戲不須憚也言訖即不見虹梁自室門而起南望無際輜重儀衛如來時翌日果徙明越巡檢將至任一日郎君前方丈悉水陸珍品顧蔡曰非敢故為異味有吝於兄恐不相益耳到任又半年一旦來見曰與兄緣數已盡從此辭矣復由虹梁而去竟不知所適蔡族亦無他咎故客省張公亢守早凉之日說斯事公亦有傳白鬚翁嘉祐二年大理寺丞常洵為荆州潜江縣尉因徼巡至徑頭市路次草中有二女子年十三四祼形如丐者傴僂出馬前云是黃八娘家女奴來投官乞命詰之一婢云媪怒我啖殘􅳨側里切數臠鞭笞百餘又以火箸遍灼我身一婢云我作勞少息不覺媪來怒我不起懸我足于梁以刀割我尻肉悉禠去衣𥜗內空囷中不食已三日矣常問何以得來云適有白鬚翁至囷前呼某等令躍出某云饑憊而囷且深不可踰又曰但躍不覺隨聲而出乃引至官道云立此少選有邑官來可訴以脫常至縣逮黃媪詰之一皆承伏即送府時魏侍郎瓘尹荆南劾治具欵贖金而釋之媪今尚在其悍戾殘忍真狼虺然嘗適數夫或凌虐而致死或恐讋而仳􅍣前此婢媵潜𬒳戕害者數人每隂晦則厲鬼呼嘯所居之前後媪叱之即泥然噫白鬚翁豈非神靈乎指導二婢復生可謂明且仁矣向之𬒳害者茹歎銜恨於冥漠中翁宜白之真官以直其冤易為力矣而令幽滯于黃媪之室豈向所殺者當死耶不然凶暴之物鬼神亦憚之也不可致詰矣斯事常洵自云韓元卿韓元卿泗州人也景祐五年苐進士皇祐中為陜州推官監司俾鞠獄于武昌事訖歸夷陵至荆州黃潭驛忽持刀自剄喉雖斷而未死祖擇之時為荆湖北提刑韓之同年進士也即視之韓不䏻語但舉手如索紙筆狀因授之書云贓濫分明罪冝處斬乃棄筆於地祖命取桑根線縫其創自以手禠去翌日遂卒先是元卿調于京師紿稱無婦娶冨室之女資送良厚洎挈之到任則故妻在焉有男女數人矣冨人之女欲以書訴於家則隄防甚密無由而逹歲餘悒抑而卒又不敢權厝于外但褁以䄄席瘞于𪠘宇之隟地韓既死方具柩而斂焉贓濫之誅豈非此耶李敏李敏嘗為兖州奉符縣主簿㑹嶽廟炳霛公殿歲久再加營葺命敏督其役或曰宜先具公裳再拜啓其事於神李不應遂徹瓦未半黑雲滿殿庭風雹大作李始懼披簡拜階下仰視神座帳上有黃龍長數丈震霆數聲穿屋而去凡損稼百餘里炳靈公自後唐明宗聽醫僧之語遂贈官立祠余謂龍蟄于神帳上因徹瓦而驚隨風雷徙去未必神之靈變也向少卿宗道云樂平港鼉潭州樂平橋港乃湘之支流傳有鼉能變怪食人歲有溺死者天聖中市民李姓者弟溺死不得尸以為鼉之食也李民痛切無方以復其冤因刺掌血濡墨作章夜醮奏而焚之祈逹于帝是夜夢吏若道士畫天神之從官者驅民以行久之至一處深嚴虛潔若大府𪠘而屏之外有數吏以鐡索縶一物長數丈如龍而一角目光如電甚可畏吏指告民曰爾將與此共見也民方悟為鼉妖已而俱入立庭下遙視殿上若有人物往來而不辨其詳有頃一人下殿呼曰江鼉肆暴枉害平人决鐡杖一百處死李某不合以掌血腥穢上瀆高真冝付王碩决脊杖十五遂俱驅出民覺而歷歷志之常惕息寅畏懼罹罪罟杜門不預外事後十餘年侍銜史王碩知潭州民坐遺火延燒一坊伏罪竟如所夢得之長沙僧寶圭云遵道者僧令遵陜州人也多智數善附麗權勢天聖中出入劉皇城家因而名聞宫掖莊獻賜與巨萬於陜州造一寺備極壯麗凡用錢千餘萬緡自安業南街乘馬而西呼僕取墜䇿時有瞽者坐茶肆前仰而言曰僧豪也遵異之過百許步下馬復來揖之未已即曰豈非墜䇿之僧乎遵曰然復曰若之聲名嘗達天聽有之乎僧曰有之因問將來之事良久曰自此十五年歲在丙戌當有大禍宜杜門避之不爾免死為幸僧不懌而起既歸陜具以瞽者之言告其徒咸曰遵道者戒行素嚴􅍔何由而至以謂不然至慶曆六年傳岩淵馬道人將圗不軌陜有市民亦預其謀民將自陳于官密詣僧謀之僧曰若自首于郡不過免死而已我有主人在京師地連但持我書詣之因其言以逹朝廷豈止免罪當獲重賞民從之行至洛黨中二卒告變籍有民名捕得畫道所以然之狀及出遵書時薛紳守陜郊大怒遂黥遵為武昌城卒董中正董中正宿州髙資户也邢州僧慈演者寓外宿有年矣畜鏹千餘萬寄於董室其後僧病且死錢遂沒于董氏治平三年春中正病亟大呼曰邢州不須呵詆待我還爾錢數日卒其長男為符離衙校既殯父即日得病信宿遂恍惚云邢州就我父索錢有人監督甚急乞少緩詎敢詆讕也既而又死宿有樂人張遂自岱嶽回出徐州界張弓手店見衙校者躍馬而來問何之曰大人有少緡錢為劵約不明在兖州對辨暫往省問若今歸耶可至我家言我甚安道中不暇作書也張至宿詣董宅將道其事方知董之父子皆已死矣四㑹縣尉吕邈云同州村民同州馮翊村民寶元中有牛生一兒旋失之民家有老翁八十餘夜則來與老翁共語人皆聞之忽謂公曰我昨日往延州與羌賊交戰南兵失利劉石二大將皆為賊擒鄰里相傳喧然聞於邑大夫方將逮翁詰之後三日敗問果至自兹州縣屢有呼問兒謝翁曰我住此令翁家不寧遂去不復來正德十年歲次乙亥仲春癸丑日虞山逸民俞洪重録畢括異志卷苐十終
