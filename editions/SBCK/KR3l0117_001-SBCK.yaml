front:
  text: 括異志卷苐一
  hash: sha256:8210ee8d6152df9f4d22424320bd1fbb75af1fa1c02cdba4e6549bf38d829c2e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0117_SBCK_001-1a}
body:
  text: 㐮國張師正纂宋州狂僧太祖仕周日尚未領宋州節􅃏時有狂僧携弹走荆􅁄中顧謂人曰此地當出天子又顯徳末一人青巾白衫登中書政事堂吏批其頰曰汝是何人敢至此其人曰宋州官家遣我来擒見宰相范質質曰此病心耳安足問遂叱去其後太祖果自歸德軍節度使受禅遂升宋州為應天府後號南郡一名南郡事具國史黒殺神降開寚中有神降於鳳翔府俚民張守眞事自稱玄天大聖玉帝輔臣其聲嬰兒歴歴可辨逺近之民禱祠者旁午太祖召至京師設醮於宫廷降語曰天上宫闕成玉鎻開十月二十日陛下當歸天藝祖􅈤祈曰死固不惮所恨者幽并未并乞延三數年俟克復二州去亦未晚神曰晉王有仁心暦數攸属陛下在天亦自有位時太宗王晋為開封尹太祖命繋於左軍􅀅無驗而罪焉旣而事符神告太宗踐祚度守真為道士仍賜紫􅂁遂營廟於盩厔之太平鎮神位次序殿廡䂓模一由神授仍尊黒殺號為翊聖至仁宗朝追謚守眞為傳眞大法師事見翊聖别傳来和天尊刑部尚書楊公礪為貟外郎時常夢人引導云謁来和天尊及見天尊年甚少睟穆之姿若冰玉焉楊公伏謁天尊慰藉之甚厚及􅁴莫諭其事後章聖皇帝育徳儲闈尹正神州楊公入幕始謁而歸語諸子弟曰吾適謁皇太子乃吾頃夢来和天尊之儀状也事在礪本傳樂學士樂學士史景徳末為西都留臺御史嘗夢一人具冠服􅁛帝命来召共行十餘里俄見宫闕壮麗殆非人世因向使者云此帝所也旣陛見帝謂曰而主求嗣吾為擇之汝姑伺此少選導一人至氣色和粹似醺酣状帝謂曰中原求嗣汝徃勿辤即頓首祈免者再三帝曰徃哉惟汝宜遂唯而去旁拱者謂史曰此南岳赤脚李仙人也嘗酣于酒帝急呼史至前曰適見者主之嗣也寤而識之旣而宻以聞具述􅀁夢曰宫中不乆有甲觀之慶明年神文誕聖安退䖏士劉易嘗記斯亊司馬待制故天章閣待制司馬公池乾興中以軄官知光山縣秩滿考績于吏部時章聖臨御一夕夢引對于便殿仰視黼座状甚㓜冲即􅁴􅀼語交親以謂改官之期方逺銓司旣質成課􅀅取旨㑹真宗不豫神文以皇太子監國引見資善堂仰視睿姿一如所夢亊見龐相􅀦所撰司馬公神道碑後苑亭嘉祐末仁宗扵後苑建一亭題其榜曰迎曙亭未幾神文棄天下英宗嗣位則亭之名豈徒然哉昔漢昭帝時上林柳葉蟲蠧成字曰公孫病已立霍光旣廢昌邑立戾太子之孫是為宣帝實名病己唐宣宗晚年長安小児疊布蘸氷向日捩之謂之㧞暈懿宗果自鄆王嗣立以今方古亊實符契古語有云翰鵲噪而行人至火花燃而得酒食此言雖小可以喻大况王者之興豈無開先之兆也異哉衡山僧嘉祐八年三月衡山縣僧某来湘潭幹亊旣畢歸衡山至中途宿逆旅忽夢行道中車􅀐戈甲旌麾儀衞去地丈餘躡空北去僧伏道左少時旣過復前又逢數􅀐叱之曰安得犯蹕僧自䟽得免因問何官也曰新天子即位南岳神徃受軄耳僧旣􅁴明日至衡山白所夢於邑令令戒僧曰祕之勿妄言後數日聞仁宗遺詔至考其所夢之夕正月二十九日也金匱云武王勝殷紂大雪平地盈尺旦日有車馬詣軍門行無轍迹太公曰此四海之神洎河北一本作伯来受軄也因祀之約束而去與此正􅀋李時亮云南岳眞人龐相國籍旣致政居於京師嘉祐八年春三月公􅀍疾至下旬病革一旦奄然家人聚哭數刻復生翌日命紙筆屏左右手書宻封俾其子奏家人咸謂乆病恍惚書字不謹遂􅃦不以聞公旣薨發視之云􅀄死有人引導令朝玉皇入一大殿庭排班龐䖏下列拜訖有一人傳玉皇詔云龐某令且歸伺與南岳真人偕来旣出殿門又有人前導云當見南岳眞人復至一殿庭列班龐居上游卷簾畢旣拜熟視乃仁宗皇帝也時神文乆不豫龐旣復􅂫􅁴體􅀱小康又聞聖躬亦復常膳乃􅀼喜故欲上聞三月二十七日龐薨越一日仁廟上仙進士時濟得之扵興教院主僧惠節會聖宫㑹聖宫在洛都東八十里望仙橋祖宗之神御在焉嘉祐八年三月二十九日晝漏盡宫側之人見王者羽衛陳布道中最後二人衣赭􅂁張黄盖乗馬相次至宫前乃不見明日宫門大敞諸殿門鎖不鑰而啓主事者大駭少時聞仁廟上仙曹門謡天聖末洎明道中京師市井坊巷之人凢物之美嘉者即曰曺門好物之高大者即曰曺門高􅂄壮童稚無不道者景祐􅀄神文詔册曹王女孫爲皇后曹王為國功臣之冠雖珪爵蝉聮者三世洎作配宸極居外戚之尊可謂高且好矣王輔藝祖定天下降蜀平呉抗醜虜破強敵􅀅百萬之衆未嘗妄殺一人宜乎後裔之興也唐郭尚父功盖天下位極人臣侈窮人欲夀登􅂄艾天謂報施之道由或歉然至瞹女爲憲宗元妃歴七朝五居母后之尊人君行子孫之禮唐史臣謂子儀社稷之功未泯復鍾慶於懿安焉以曹氏之餘烈近之矣陳靖陳靖字唐臣鉅野人少倜儻有氣節通詩易嘗從范諷石延年劉潜游景祐五年以進士特奏名得三禮出身荐為邑佐皆有䏻聲稍遷孝感令以公事忤郡太守輙致所事而去即日僦舟東下隱於葉山未幾詔下以太子中舍致仕值歳荒徙家京師賣藥自給朝之公卿多故人踵門者輙避去或遺金帛即散道士丐者未嘗有所畜與其妻孔氏皆學辟榖徃徃經歳不食嘉祐四年思武陵山水之嘉盡室出彼王介甫高其行以詩送有知君欲上武陵溪水自東流人自西之句旣至武陵結廬于髙梧市居數月䘮其妻自是不接人事杜門稱疾惟焚香誦易而已六年七月十七日亭午􅃍命其子庠具紙札作書遺張郎中顒曰近上帝以靖平生無謟俾主判地下平直司候天符下即之任矣張時軄江東􅈇運得書以靖為病心者不復報是日又躬為一書封緘甚宻戒其子曰張公歸郷以此書授之不可示他人及􅀻發違吾言汝爲不孝其子謹蔵之自是多為􅁔詩皆有脫去世俗之意七年十一月十二日平旦謂其子曰吾數盡矣後亊一託張秘丞主之言訖而終時張秘丞顒􅀅赴官益陽前一日與靖别翌日得其訃亟為辦䘮亊葬于􅂄闍山之側治平元年七月張仲孚自江東還其子庠捧父書號泣来獻封緘如􅀄發之其始末皆叙訣之辭中乃云平直司必然失為議定皇嗣亊勿怪草草明年秋英宗由大宗正爲皇子而靖扵六年七月爲以書已有選定之語由是知帝王之興皆受命于天黙有符􅆻非偶然矣此皆畧取張仲舉學士所撰陳靖傳云醴泉觀祥符中京師東南隅醴泉涌􅀛蛇見其側飲之者疾瘳即其地營祥源觀其後灾再加繕搆改號醴泉觀熈寜八年又易傾朽荐加堊􅅚功畢落成命教坊伶人奏樂于庭是日真武影現於殿脊火珠中其部從神官旂纛之􅀋望之悉具京師奔走觀瞩者數千萬人見陳虞部幵云賈魏公賈魏公昌朝先徳名注嘗為棣州推官公方在孕一夕夢緋衣冠者一人自空而下以巨箱捧貂蝉冠以獻俄而公生始數歳先令公為瀛幕公時在膝下契丹數十萬攻圍踰月城甚危守陴者聞空中神告曰城有中朝輔相勿憂賊也數日虜遁去城卒無患公自宰相出鎮擁節􅃏者垂二十年官至兼侍中若然則貴賤之分淹速之數固由黙定世之汲汲於進者無所不至豈昧於居易之理乎大名監埽河自大坯而下多泛溢之患岸有缺圯則以薪蒭窒塞􅀘薄増卑謂之埽岸每一二十里則命使臣廵視凢一埽岸必有薪茭竹捷樁木之􅀋数十百萬以備决溢使臣始受命皆軍令約束熈寜九年大名府元城縣一監埽使臣所主埽岸有大黿屡来嚙岸之薪蒭似􅀅穴焉遂彀弩射之中首而死是夜夢一緑衣創首謂監埽曰汝殺我我已訴於官矣又月餘病疽死見二使者執之而去曰汝嘗殺人監埽􅀼思之曰此必殺黿亊也行僅百里入一城使者曰吾有亊當先白所由司汝姑止此無他適二使旣去仰視高閣金碧相照有二神人守􅕡如道士觀所謂龍虎君者以姓名白之乃引入仰視其閣有榜題曰朝元之閣下見韓待中稚珪憑几而坐侍者數十人若神仙儀衞乃再拜訖韓問来状遂白煞黿亊因曰隄岸有决當受軍令之責非徒殺也韓曰汝亦何罪儻見隂官但乞檢上清格即岀門見二使者至遂引到一官府庭下果詰以殺黿亊對曰某主埽岸河流奔猛漲溢不常苟有决漏則當誅黿敗吾防不可不殺乞檢上清格隂官取格視訖謂曰上清格云無益于世有害扵人殺而不償罪固難加隂官命前使者引出行十餘里若墮眢井遂寤亊聞之于劉大卿襲礼云㒒射􅈦陳英公執中􅀄以左正言謫為中允監永州酒稅郡守常以諌官待之間日具肴膳就其所治以延欵之英公即座周視居宇忽於榱桷楣間注目乆之顧侍吏曰見一牌否左右對以無覩郡守而下皆曰未甞有牌陳笑而雜以他語及歸家人怪而詢之公曰宛見一金字牌書㒒射􅈦字公由是益自􅀒旣而兩正台府竟踐此位雖以司徒致政然在仕之時官為端揆進士魏泰呼英公爲舅祖得聞其亊吕樞宻吕樞宻公弼丞相申公之次子始秦國妊娠而疾􅀅去之命醫工陳孫煮薬時方􅀄夜逮藥􅀅熟己二皷坐而假寐忽然鼎覆取諸藥品差剉末再煑之俄以嚴皷不􅁴再覆旣而又煑而加火焉困甚就榻夢一神人披黄金甲持劒叱陳曰在胞者本朝宰相也汝何䓁人敢以毒藥加害陳恐慄而寤遂以所夢洎覆鼎亊白於秦國曰在孕者貴人也雖疾當無所損其後生寚臣熈寜中自樞宻使出鎮而薨聞之馬瑊運判云括異志卷苐一
