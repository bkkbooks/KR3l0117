front:
  text: 括異志卷苐四
  hash: sha256:e0effe6d6cc04d3dee230a58c0770fbac743f088c2ed9d3a4e661d76370ffcd4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0117_SBCK_004-1a}
body:
  text: 襄國張師正纂陳省副慶暦􅀄陳吏部洎自三司副使謫守鍾離郡比曹貟外錢愚時為通倅錢善數術一日俾其邑封具酒肴悉召陳宅之長㓜㑹于倅居明日錢詣陳謝曰昨日以菲薄奉邀貴眷者􅂓示區區之意以託後亊爾陳大驚曰足下四體甚安以言何謂也錢曰明年正月某日某當死乞護送諸􅀌歸京師故棲則幸甚陳知錢善數術亦不以為然愚嘗謂其妻子曰陳亦行尸耳過明年復舊官則不可矣明年正月如期而卒月餘陳徙廬州未半歳復召為三司副使數月病背疽而死越三日陳有少女奴年十二三忽據榻附而降語曰吾昨日巳見王􅀅設酒我辤以創痛而止門外從者五十人悉戴漆皮弁衣皂緑緋寛衫烏氊靴亦無異人世不復號慕以自苦也又數日復降語命設榻如賔主位曰此前濠州同官錢比部也吾今得知益州復與比部同官前日已嘗宴㑹相得之歡不異平昔可令院子傳語錢家縣君言比部教善視十一郎比部㓜子最所鍾愛者今再與陳吏部同事甚樂勿思念悲慟也先是二日錢之㓜女方十餘歳睡中京號呼之良乆乃寤曰我見比部與陳吏部在丨一髙堂上宴㑹樽爼㡩幙無不華麗左右侍衛甚盛因念父巳去世不􅁴啼泣􅀍呼方省與陳宅女奴降語相符昔之小說載幽􅄀事者多云人間郡縣隂府悉同若陳吏部之爲益州豈其然乎比部之子閎今爲供備庫副使言之甚詳王待制天章閣待制平晉王公質之謫守海陵也郡之監兵治宇之西偏有射堂堂之前藝􅂼為圃一日晨興治圃卒起􅈅畦見一老媪立射堂中氣貌甚假卒驚詢之媪曰我乃監兵之母也汝亟白我在此卒曰監軍不聞有毋媪何妄也媪曰苐告無多詰卒入白監軍遽出視之姿状音息真毋也而言語哀惻監軍號慟家人己下皆徃拜侍母急曰以幕􅇈射堂之軒使不外瞩旣而詢其􅀁從来母曰􅁳中有一事應未受生與見伏牢者皆給假五日我獨汝念是以来耳監軍遽謁告且白平晉公平晉公朝服徃拜而以常所疑􅄦神事質之皆不對曰幽􅁳事泄其罰甚重無以應公命平晉又問世傳有閻羅王者果有否復誰尸之曰固有然為之者亦近世之大臣也請其名氏則曰不敢宣于口公乃遍索家蔵自建􅂭以来宰輔􅀞像以示之其間獨指㓂莱公曰斯人是也復問􅁳間所尚與􅀁􅁖亊荅曰人有不􅆷害物性者􅁳間崇之而隂謀殺人其責最重如是留五日遂去或云平晉由此不復􅁏食平晉嘗為之記其子復以示魏泰云石比部比部外郎石公弁言皇祐中始得大理寺丞監并州之徐溝鎮歳餘夢一􅄦朱髪青膚自中霤下瞰垂臂捽一女女子髪自地而出謂之曰送汝徃李專知家作女石驚􅁴心悸遂不寐逮曉時有酒稅􅂣官姓李者石因問爾昨夕有何事李曰四更􅀄息婦生一女子石歎異久之其後嬰兒有疾召一姥視之曰本太原人隨夫寓此僅四十年凢官扵此者無不出入其家此􅇬宇亦􅇮日都監之官舍徐溝舊差班行監當今差京官今中霤之下者嘗有井李殿直監臨日鞭一女使不勝楚痛投井而死遂廢不汲仍遭大水湮焉石愈驚駭方省前夢之驗也曹郎中曹金部元舉治平中嘗爲福建路轉運使􅇬宇中有池亭曹朝夕止扵是家人怪其肌體日瘠精神恍惚訊之即曰嘗有李家娘子甚美與二婢子来侍我咸謂物怪所惑召醫巫視之悉無効乃涸池求之得三鱧一大二小曹遽呼曰勿害李家娘子遂臠而焚之曹亦謝病歸維陽歳餘卒陸龍圗龍圗陸公詵尹成都日府宅堂前東南隅有大枇杷一株其下夜則如數女子聚泣者燭之則無所見厥後半歳陸卒於位熈寜六年成都闤闠間遇夜邏卒聞哭聲􅊯􅊯然凢數十䖏就視之則無有至七年八年大旱殍餓盈路継之以疾疫死者十六七洎至秋麥則無人􅀵刈至於綾羅紗錦綵箋諸物鬻者亦少宜乎􅅎兆之先見也丁都官餗目覩宋中舍太子中舍宋傳慶諌議大夫太􅀄之子自言其父性􅄝鱉嘗一日得數鱉付厨婢臛之其一甚大婢不忍殺放之溝中逾年婢病疫疾苦心煩􅀬殆􅀅卒家人舁致外舍俾卧以俟終翌日視之則自户閫至婢胸脅間皆青􅅺塗漬婢亦稍間訊之則云不究其􅅺之来但煩􅀬减差耳家人伺之逮夜有一大鱉自溝中􅀍體以􅅺直登婢􅅐冰之婢逾旬遂愈詢其致鱉之自婢乃述其本末天聖中傳慶為遂寜通守與先君言如此馬文思文思副使馬公仲方尚書亮之姪也遇罷官多寓家髙郵軍細君之妹亦居是邑嘗以牝羊饋於公未幾生一羔秣飼數月閑居患無人牧放乃鬻於屠肆翌日臨格􅀅烹之出刀于側且瀹水以俻燖濯􅀅刲而亡其刀良乆見其靶扵溝中取而洗拭置于床旋又失之乃羊所生羔衘而投諸溝又以足踐淖使勿見屠者視之大感傷後以羊歸馬氏自此不復屠羊公亦以羊施佛寺公嘗守全州嘗自書斯事于閱理堂之壁云陳太愽太常愽士陳公舜俞在明州觀察推官有二子一男一女皆六七歳一日戯嬉于外逮歸則男子靣有墨䂓其左頰女子朱䂓其右頰家人怪問其所䂓之自則云不知家人但謂小兒戯而為之命滌去翌日復然如是幾月餘日日如是而無他怪陳慮為怪之漸也白轉運使求涖他局遂㳂牒于浙西􅇬旣空郡給二皂以守舍一日二人相與言曰陳察推向以二児面有畫以為怪而竟無他我等當驗之有􅀎獨入堂中自朝至暮者醵錢若干以賞之一皂欣然携短劒入堂之西序醉卧牖下及醒日已過午吏喜其無怪又喜􅀅􅀗所賞也徘􅆦伺晚而出俄然堂扉啓有數婢從一婦人臂鸚鵡立堂之戺若所䂓畫然吏熟視黙念曰苟怪止如是亦何足畏方􅀅以刃刼之忽心動若大悸不知其身之所有驚呼携劒突門以走犯譙門穿長街若發狂失心者市人覩其持劒以為有變皆恐避之未半里蹷踣道左衆掖起奪劒而詰之移刻始䏻言竟不知其何怪也進士魏泰遊明州親見此事馬仲載熈寜六年開江南為郡縣旣得峽州築為安江城命内殿承制馬公仲載統卒三百戍焉時石鑑以兵馬鈐轄知辰州總千兵亦駐城中一夕邏卒云蠻兵数千夜當攻城石聞之即欲遁去馬曰鈐轄儻出則誰與守遂仗劒於門令曰敢出者斬石遂留蠻兵亦不至由此石頗衘之未數月馬忽仆地懵然無所知僕從乃舁辰州就醫藥石乃劾其棄城戍􅀅以軍令裁之馬病稍閒就鞠于武陵乃具饌遥訴司南岳翌日有稚子方十嵗未嘗讀書忽睡中呼索紙筆乃書曰南岳門下牒􅃙馬仲載念卿遥祭之專勤聽其訴聲之怨切據卿之罪理當䘮命上天愍卿常行吉心䏻守所職止命降災奪官更宜省循以邀福夀懋哉幸矣熈寜六年十一月二十四日復取朱筆􅀞一印於日月上􅂐文亦不可辨児復睡少選而寤詰之云有一人青巾黄衫以黄􅃙付我亦不知其手自摹冩也仲載之事武陵人無不知者南岳􅃙好事者多録而蔵之夏著作尚書郎高公靖蔡州人罷官歸郷里村居嘗坐壠上視農事有耕夫於土壌得鐡牌上有大字云司法叅軍夏鈞髙亦不喻數年授知道州相次有長沙人夏鈞調本州司法叅軍高方悟鐡符之前定也鈞官至著作佐郎兾秘丞兾秘丞􅈾皇祐中知河南府緱氏縣代人􅀅至預徙家于洛城獨止于縣之正􅃦一夕夢二女子再拜於榻前問其􅀁以云妾等是前邑尹家女奴也以過􅀍鞭死􅄟于明府寝榻之下向来宅眷居此不敢妄出恐致驚怛今夕方敢誠告乞遷于野乃幸之大也兾可之明日發其地果得二枯骨紅梳綉履尚在命褁以衣絮祭以酒飯加之楮錢埋於近郊數夕後夢中前謝而去樂長官浩言之梁寺丞梁寺丞彦昌相國之長子也嘉祐中知汝之梁縣其内子嘗夢一少年黄衣束帶紗㡌神彩俊爽謂之曰君宜事我不爾且致􅍔旣窹白梁梁不之信旣而􅀼其衣冠簮珥掛於竹木之杪變怪萬状梁伺其嘯㧞劒擊之􅄦曰嘻汝安能中我又命道士設醮以禳之始􅃙壇奪道士劒舞於空無如之何謂梁曰立廟祀我我當福汝旣困其擾不得已立祠于􅇬舍之側又曰人不識吾面可召􅀞工来我自敎之繪事旣畢乃内子夢中所見者㑹家人有疾􅄦投藥與之服輙愈歸之政事有不合於理者泊民間利害隱匿亦宻以告梁觧官廟為後政所毀􅄦亦不靈聞之洪正卿進士云楊郎中郎中楊公異性好㓗静過甚不近人情寓居荆南對門民家有子數歳膚髪悉白俗謂社公兒異􅁖焉屢呼其父與五緡令殺之民得鏹潜徙去楊止一子俄病癩肌潰而卒近時有人死而復生云隂府新立速報司若楊氏之報信哉張太愽治平三年太常愽士張忘其名知兖州奉符縣太山廟据縣之中令兼主廟事歳三月天下􅆢神者悉持竒器珍玩来獻公徃徃􅀼取之旣觧官寓家於東平一夕聞中闔外如數十人語聲雜遝不可辨晨興視之其􅀁盗㡩幙噐皿之􅀋悉次第羅列於􅈦廡間視槖篋封鐍宛然如是者凢數夜張大怖駭悉取燔之越三日奉符舊事發兖州獄吏持檄来捕旣就逮左驗明白竟寘牢户楊從先殿直楊從先至和􅀄監大名馬監其冬夢授樞宻院劄子云千里重行行右劄付從先准此旣􅁴不喻其旨明年春大雪牧馬多死監牧使臣衡替者數人乃悟千里重字也以配行衝字也再言之者皆􅀍責也括異志卷第四
