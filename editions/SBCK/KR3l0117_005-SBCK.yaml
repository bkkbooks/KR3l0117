front:
  text: 括異志卷苐五
  hash: sha256:fe53cc51d018fa06c28595e75c45d23c6f4a7de9cbd7eef77f7756bd866a4a69
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0117_SBCK_005-1a}
body:
  text: 㐮國張師正纂李叅政李叅政至性修㓗夷淡年幾強壮尚為布衣開寚中有省郎典齊安郡至依門下為學讀書着文夜分不寐一夕有二女子盛冠服鳴珮璫揖李而坐容態殊麗風度婉約李恍不知其所從来因定神肅容熟視而問曰􅄦邪仙邪荅曰奴非􅄦也乃仙之流亞也少時出户不見自此月三至或飲之以酒或啜茗而去談幽顯之事辭簡而理明守􅀅受代二女復来謂李曰與君欵奉三年於兹矣見君居常以禮自持未省一言及亂噐識洪厚終當逺到然君前世曽為商賈􅀒人息錢甚夥以貧不䏻償故今世俾君羇蹇於壮歳因出書一封與至曰俟改元太平乃啓不爾當有禍旣而太宗踐祚改元太平興國啓其封見太平興國二年李至第二人及第旣而果然後歴清顯入叅大政擁旄巨鎮而終樂京著作嘗言梅侍讀侍讀梅公詢端拱二年第進士清􅁉有才早厠文館坐在人洎􅆡者數十年景徳中甞夢與一士人年甚少共射一石牛梅中脅少年者中首至祥符中真宗東封詢􅀍選於太平頂行事宿齋其上是夕燔香再拜黙祈􅀅来通塞之事旣􅃦夢牛馬羊布野有二牛闘于前一人􅀍冠服前謂牛曰伺吕公再入中書闘亦未晚牛遂觧去其後自尚書郎帶軄知濠州吕申公以太常愽士通守郡事儀状酷似向夢中所見又守倅之居花圃中各有一小石牛梅因省前夢厚結於申公寚元中吕公入相擢梅爲天章閣待制其後申公自北都再持政柄梅己為樞宻直學士判審官院又遷為侍讀學士郡使是歳十二月得疾出守許州以至􅂢舘夢中所見牛馬乃郡牧使也二牛闘者其年歳直丑十二月又丑也二牛者逢二丑而疾作也神先告之矣評曰君子居易以俟命語曰冨而可求也雖執鞭之士吾亦爲之明富貴貧賤以時而来不可䂓圗而取梅公早預俊選屯蹇不振年始從欲方遇知己官歴兩省軄居禁近擁旄巨鎮克享遐齡始否終泰豈非命􅁘韓宗緒韓宗緒龍圗贄之子以父任􅀘􅀅作監主簿皇祐秋鎮􅆹預薦偶於相國寺資聖閣前見其家舊使老僕呼謂曰若非某乙乎死乆矣何得在此曰某今從送春榜使者又問榜可見乎曰有司􅀵掌甚宻不可得而見也又謂曰汝䏻宻詢有我姓名手茍無亦可料理否僕許諾試爲盡力又問復於何䖏爲約㒒云復期于此他䖏難庇某之迹此地雜沓人􅄦可得叅䖏他日如期而徃㒒界在焉遂開掌見己之名在片紙上揭其下乃田寳鄰也僕曰此人明年當登苐官甚卑郎君亦自有科名但差晚耳况身已有官故得而易之若白身則不可因忽不見明年韓登第曽以兹事說於親舊間治平中韓玉汝龍圖與供俻庫使叚継文同使契丹至雄州叚嘗為雄之監軍雄之舉人皆上謁田寚鄰刺字厠焉韓見之大驚與叚盡道所以叚復以韓事本末語之曰遂齊戒夜醮作奏訴于帝木炎嘗侍父官瓦橋俻知之熈寜中炎登第為岳州巴陵簿縣令王澤嘗談怪異王云應舉時聞州東有一人常入􅁳言人吉㐫甚驗遂率同人數軰就問之其人在小邸暗室中旣見遂以􅀅来得失叩之再三不語俄又面壁而坐云田寚鄰公事至今未了安敢有他科埸事不知田寚隣何人也炎方省向者韓叚之言寚隣以累舉特奏名其後官甚卑南州壬子虞部貟外郎杜公彬罷滁倅至闕奉朝請一日遊景徳寺訪朝客不值方假筆札以誌門偶狂僧嚴法華者自廡下直揖杜君杜雅聞法華言事多中因以平生未然之事諮之僧奪筆索紙杜以刺字之餘授之大書云南州壬子杜不測其旨後數月授知漳州到州閱圗經則陳氏偽據日目漳爲南州杜嘆訝之自揆以爲壬子者有士之號豈隱其為州之意丨邪後嵗餘杜終於任其子煜用浮屠法作七齋飯僧次煜因言及法華之事取其書以示群僧因觀其壬字中一畫差長若壬丨字遂以甲子推杜君卒之日正壬子也其子煜言之於魏泰并出其書李侍禁李侍禁齊善􅀽許之術士大夫多喜之有别業在華隂之東郊其妻先卒買一妾生二子一男一女李旣死二子始髫齔長男年二十餘乃嫡室所出與其妻謀曰二子長立當有婚嫁之費且分我資産䏻致之死地家資悉我有也自此二子衣不得完食不得飽笞罵挫辱無日無之俄得疾疫遂絶其藥膳雖杯水亦不與相継皆物故妾不勝怨憤日走伏齊壠號哭以訴數月妾亦死有隣家子於閴巷見齊手携二子妾亦侍側顧謂鄰家子曰我長男不孝不友虐殺弟妹又令此妾衘恨而殁若可語之吾亦訴扵隂府不汝置也隣家子知是􅄦􅀅走避因忽不見隣家子遽来告之亦不之信一旦其妻具酒肴㑹親舊女客於中堂厥良獨坐書閤下乃父自外至數其罪以杖擊之坐客聞其號呼悉徃視但見仆地叩頭服罪言虐殺二子状數日乃死其妻後數月亦死田宅家貲悉籍没噫李齊之事不誣矣世之人父死而謀害㓜稚以啚資賄者多矣目覩數族雖不若李為􅄦靈但見其身夭折子孫淪胥以至無立錐之地李齊之事足使狠子庸婦聞之少警其心董職方經臣親見兹事云李氏婢賈國傅大冲嘗􅀃有李某屢典郡旣卒家人歸京師舊居有老婢凢京城巷陌無不知者家之貿易飲膳衣著洎親家傳導徃来悉賴焉邑君愛之如兒姪明道春方淘溝俾至親家通起居抵暮不歸數日㝷訪無迹邑君曰是媪苦風眩疾作墜溝死矣即命諸婢設靈座祭焉家之吉㐫亦来報邑君泣曰是媪雖死不忘吾家明年春自外来家人皆以爲􅄦也媪拜曰去歳令妾傳語某人至某䖏風眩作墮溝中某人宅主姥見之令人拯出滌去穢汚加以藥餌得不死某誓傭一年以報今旣朞即辤歸徃詢某氏果然是夕有青巾男子見邑君夢曰我清衛卒也向死于巷左昨聞宅上失女使設位以祭遂假其名􅀼享焉今聞己歸乃拜辤而去李比部李比部從周景祐四年隨郷書来京師與數同人僦舍於麻稭巷嘗五皷而興􅀅謁親知于逺坊者始啓􅃦户即踣于地奴僕扶視氣息殆絶至己午間始惺然曰􅀄啓􅀜見一􅄦戴短巾衣緑寛衫􅉳靣于􅇟状若祠廟中􅀁謂判官者以氣噓之如霜風之切骨遂昬然亦不知委頓於地也明年校藝不利於南宫胡殿丞胡殿丞偃潭州人至和中授峽州簽判待􅊴荆州僦居扵公安門内睱則坐於􅈦戺間嘗有持刀鑷者比日過門植足注視良乆乃去胡異之一日呼與小兒剃髪因問曰汝常顧吾門内何也曰有一親識姓某在峽州爲吏兼管􅁳曹亊多而身勞欲公垂庇是以日踵門而不敢言胡未之信及至任聚群胥出姓名問之有一人前曰刀鑷漢竟多口胡屢詢以􅁳司所軄但云未可輕􅂥居無何胡以先人忌晨飯僧課經具䟽焚楮泉迨明日其吏至案前以手就懷􅊥昨日􅀁焚䟽示若新冩者巳而􅁅滅且曰殿丞見廹不敢隠然某巳得罪而殿丞亦不免减禄筭矣數曰吏􅁀卒朞年胡以病癈於家得之李林秘校云謝判官謝判官平原人寚元中嘗為曹州觀察推官視亊未幾一夕夢老父引之入大第中家頗豪盛妳媪抱嬰兒飾以文繡指謂謝曰此君之後身也謝問此何郡復誰氏之家老父曰成都府陳郎中宅也貲産甚豊君心樂乎謝亦頷之旣寤甚不懌謂妻子曰吾其死矣日䖏致後事旣而秩滿復調棣州判官到官數月又夢前老父復引至昔之第有小兒衣紈綺歔階下指謂謝曰此前日之嬰児也今始五歳尚未語旣寤謂家人曰今日之事必不可免居常戚戚不怡考滿又􅀅赴調復夢老父導之入門見昔日之兒冠緋㡌紫􅂁銀帶立於堂戺顧謂謝曰此子已讀書矣若其謝我􅁴大􅁖之月餘病卒其子訥慶曆六年登進士第親􅀃如此劉觀察宅京師保康門有劉觀察之别第每僦於人翰林學士曽布嘉祐丙申之冬以郷貢􅀅試禮部僦此第以居一夕不寐聞􅈦中有人呼曰太尉来旣而又有若徃来問訊切切細語或如傳授指令皆以太尉爲稱歴歴可審甚訝之翌日究其宅之坊曲地里則韓通之故第也通甞為王彦昇族於斯第之下進士魏泰親得之於曽子宣云柴氏枯􅀥邢州城東十餘里周世宗之祖荘也門側有井上有大􅀥一株世宗時柯葉茂盛垂䕃一畒恭帝旣禅􅀥遂枯死明道中枯卉復生一枝長一丈餘蔚然可愛井中水如覆錦綉柴氏懼遂塞井伐木明年詔求五代帝王之後柴氏自邢蔡􅉑䓁州諸族􅀍甄敘入官者三十餘人井􅀥之祥亦非虚應僧縁新武陵郡西有佛廟曰栗園院主僧畜一犬㡬十年一夕夢犬語云累歳荷畜養之恩今當與堤頭杜翁家為男故来奉辤僧旣􅁴不以為意黎明侍者以犬斃聞因大驚乃䇿杖至惿頭杜迎門謂曰何出之早也延僧坐僧曰昨夕檀越家豈有子孫之慶乎翁對以息婦夜生一男及詢以何由而知僧遂以夢告翁亦駭異因許之為浮屠令以披緇剪髪法名縁新鼎人率知之括異志卷苐五
