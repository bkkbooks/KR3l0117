front:
  text: 括異志卷苐八
  hash: sha256:fe05dd64f39357dd38c3fee2806b53e07dd249812644a59edc946a1f3ab11f00
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0117_SBCK_008-1a}
body:
  text: 襄國張師正纂明叅政明叅政鎬噐識恢敏才學優贍第進士出入臺閣累歴顯要慶暦中自京尹入叅大政未乆疽發于背遣使致祭于岱宗以祈􅁳祐使者馳至岳廟祭訖是夜宿廟下睡中大厭從者呼􅁴曰夢神呼我立殿庭見百餘人擁一荷校者熟視乃叅政也旣而杖背二十駈出我不􅁴大呼遂奔􅀐而歸明已沉困召使者問祭之夜夢中奚覩具述所以明曰然又云明始病數日即似荒亂有郎官某人乃明之同年進士素相厚善明俾召至謂曰何以不来相視郎官曰比為叅政暫請服藥假不意實抱疾耳明曰曽見無頭􅄦語否郎官大駭曰豈未朝飡乎曰已食矣又曰豈未餌湯劑乎曰已屢進矣曰然則斯言何謂也明曰召同年正欲􅀃此亊又曰来矣可􅃪之郎官使聞如遊蜂蒼蠅鳴地下明曰語乃胸中出向者妖賊據甘陵奉朝命攻討外圍旣固攻具備設平在旦夕不意文相國来撫師􅀅坐而􅀵功心實忿之遂妄殺數人今實稱􅁈於我病其不起乎數日遂卒夫為􅀅三世道家所忌謂攻城野􅀾玉石難分耳明以已之􅀻忿殺無罪者宜乎見厲於垂死嗣續汩而不振也徐學士熈寜中徐學士禧始受軄官中書習學公事自豫章侍親之􅆣下舟行次彭蠡湖昩爽而行期早抵南康軍俄而水面白霧四起始慮風作促舟人疾棹未四五里霧稍開見二朱漆萬斛巨艦旌旗赫奕摇櫓者粛而不譁相去百餘丈東南而逝未二三里又見朱艦間以金碧旛斾尤鮮華亦相踵而去少時又逢二白艦載甲士數千戈㦸森列尾三舟而行徐之舟人旣見俛不敢正視然望其船逺而益小洎抵他岸皆若一履宫庭湖庿水經具載其靈近傳有小龍者多出䖏其中豈其靈變􅁘徐學士嘗言魚中丞中丞魚公周詢天聖四年第進士甲等􅀄命大理評事知濟州金郷縣嘗晝卧書閤中有守閤老卒入白事但見烏虵蟠於榻矯首冠幘叱聲甚厲卒走出呼侍吏共視之乃見熟􅃦未窹後至御史中丞而卒張都官居方云祖龍圗祖龍圗無擇始登第倅通齊州歳餘得吿歸蔡州營葬事畢復任後春季檢視官物于禹城縣過石河灘沙中得片石上有數十字乃葬其先君之誌也遣人視墳壠無一抔之缺竟不測其所􅀙来范郎中徽之言尚寺丞司勲外郎尚公霖祥符末以殿中丞知夔州巫山縣有尉李某者山東人頗幹敏一旦疾病尚聞其委頓日徃臨問曰萬一不起可以後事告也尉曰􅂅以老母㓜女為託公儻垂仁惻某雖死敢忘結草之義乎尚泫然愍之旣死出俸錢送其母及骨函還郷里嫁其女於士族一夕夢李如平昔拜且泣曰某懇求於隂官今得為公之子以此為謝耳是月邑君妊娠明年解官㳂流赴闕或遇灘險隱約見尉在岸上指呼􅀅抵荆渚又夢李報曰某明日當生府中必送一合来宜􅀵之翌日果誕一男子府尹以合貯粟米遺尚曰聞邑君育子以為糜粥之具因字頴曰合児頴性純厚敏於行而篤於學官至大理丞張稚圭􅀃髙舜臣大丨名府進士髙舜臣嘗言其徔兄祥符中為衙校董卒數百人伐木於西山一日入山督役迷路聞樂聲合作於山谷間㝷聲視之見婦人數十衣服華麗執笙竽㑹飲于磻石上居席首者召高坐其側亦及以酒肴謂曰吾欲婦汝何如髙但愧謝又曰汝今歸寨中吾􅀅継至是夜果徃髙亦恍然不測自此遇夜即至室中帳㡩枕褥之具俻設暁復失之若此者逮一月役兵取材旣畢與高同歸高之父母聞之大驚曰此子為石妖木魅􅀁惑也因即東廡而居家人視之則装􅆍之具冠衣之􅀋悉已張陳高氏家人亦罕見其面或見其冠珮或見其帬􅃭而已家属相與憂懼慮久而致丨􅍔乃召巫覡具符水禳詛之術女子笑謂高曰我豈妖怪害人者何見疑之􅀷也儼然殊不顧高氏家亦無柰之何居半歳高氏㑹客烹牛為饌女子見而大駭曰我以君積善之家故􅂅奉巾櫛於子亦􅀅福汝家不意􅁀􅁖之如是君家固不當留亟送我歸也高白其父母聞而大喜立俾其子送之去西山數舍其夜不至高亦不敢復前但望山悵恨而歸髙氏子竟亦無恙大名進士陳倫因言神怪而及之亦未以為信治平􅀄予為大名鈐兵進士王詹亦道其事與陳􅀃正同舜臣後以累舉推恩得州長史王慶諸司副使王􅂟皇祐中差知豐州性剛􅁀刻而少恩一日視亊忽􅁴頭昏痛不可忍捫其首生兩角僅二寸許數日大呌而死有李顓者景􅀄登進士苐性豪蕩不檢邢州觀察推官病疫死旣歛其頂髪如珠有二角長一寸餘左蔵朱允中大邑主簿王綱言孫翰林慶暦中楊内翰偉郡封坐堂上見一老嫗蓬髩敝衣逕入子舍詢何之不應頃之復出語云郎君教我来老息婦不敢自專遽呼左右逐之出中閫即不見乃召子婦詰之云老嫗言来日郎君欲就息婦房中宴飲方責其妄語即便走出舉家驚愕翌日宅中濃霧昏塞子舍尤甚辛螫口鼻不可嚮邇門闔不䏻開乆之聞語笑􅁔管之聲自辰至申昏霧漸釋排户而入詢其􅀁以云有一少年與我懽飲噐用珍麗筵設華煥飲饌音樂無不精羙我亦忘身為楊氏婦也然精神頗亦失常即召劉捉􅄦者禁劾之不䏻已聞翰林孫郎中專主符禁亟俾視之曰此􅄦庿在東南三十里􅀅為神矣何敢為如此亊遂書二符致婦􅆍室之門又曰知某今日到宅明日定不来更一日必至宜令其夫洎女使二三人守之􅄦若不得入婦室當變怪于外盖欲誘之出也出則不可治矣越一日果至雖昬霧如􅀄獨不入子舍俄而郡封中􅁖婦欲奔視制之不得出少時霧氣觧散郡封亦復故孫乃與楊公假静宅作壇奏章自兹不復来孫云已囚海上石室矣慶州察推張偉嘗言之黄遵黄遵者家興國軍性踈放頗知書而䏻丹青善􅀓人之形神曲盡其妙事母篤孝凡得􅀞直未嘗􅀻畜供甘㫖外悉歸於母慶暦中遵忽感疾而死凢三日心尚暖母不敢歛是夕遵復甦家人扶坐問皆不語遽索紙筆圗一人形容良乆乃語始入一公府見廊廡肅靜皆垂簾閽吏通曰興國軍黄遵今追到有吏問遵曰爾黄遵􅁘遵曰准前謂吏曰遵未嘗有過何以見吏曰爾筭盡乃至此遵方知身死遂號泣拜曰母老無兄弟乞終母夀吏曰此不敢與聞遵拜泣不巳吏哀其誠乃曰俟主者来若自告之移刻兩廡吏喧然曰至矣一吏升堂軸簾東北隅有户洞開朱吏數人前導見一人紫衣金帯者升堂坐諸吏僅百人列階下致恭畢分入諸局始見領數十人荷校者露首者至紫衣前訊訖駈出巳而呼遵問里閈姓名遵號慟叩頭拜曰念母老無兄弟遵若死母必餓殍乞終母夀遵叩階額血濺地紫衣顧左右索籍視之乆乃謂曰汝母夀尚有十餘年念爾至孝許終母夀紫衣以筆注其籍命左右速奏覆遵拜而出復呼之命俯階戺問曰汝在人間與人傳神者是乎遵曰愚昧無䏻僅成其形耳又曰爾識我否遵曰凡目豈識神儀曰我乃人間所謂崔府君也爾熟視吾貌歸人間冩之然慎勿多傳若所傳惟肖恐人間􅀕祀不常返昏吾慮記之勿忘自後遵在興國凢所冩者三本正一􅀞於地蔵院二為好亊者所􅂑厥後十年母以夀終旣葬服除遵一日徧辤親識因大醉數日而卒前進士朱光復嘗逰興國軍熟知其亊劉徳妙寳元中夏英公爲陜西路安撫招討使駐兵鄜畤嘗與僚属言向自知制誥出守安陸郡有羇管婦人劉徳妙言事頗中因呼而問之爾有何䏻爲丁晉公所知劉曰某本捧日軍之營婦也嘗出詣親家憩扵汴上柳隂忽一人巾幘紫􅂁就巳而坐云是扶溝縣録亊有亊之府溺水而死訴于隂官俾我復生至則身巳壊然尚得䖏於陽間今欲憑附于汝我䏻知人未萌之休咎言旣驗人必以愍謝汝若亊我以此為報某懼不敢荅洎歸􅀑亦隨至他人不見也夫亦不信則夫婦皆苦寒􅀬嘔􅂥不得巳亊始則火伍中人来占亊悉驗俄而里巷皆知旣而公卿之家呼召相継晉公不欲營婦出入卿相之門遂度為女冠丁公南遷某亦連坐編致斯郡實無他術但萌于心則􅄦知之夏曰吾心有一亊爾知之否劉曰知之但乞先書而糊其外方敢言也某是時苦家貧干執政求知益州遂屏左右書畢封置于案劉言如所書仍云亊亦不諧旣而果然弔􅅦酒於彫隂具聞其􅀃稅道士景祐中利州道士稅某善妖幻洎符禁之術利之冨民或有所求不與者即為壇於宻室置大桶於前􅀍髪仗劒追其䰟神入桶覆之以石其人乃病然後假以符水或祠醮謝以財乃去石遣之其人遂愈市井有鬻籠餅洎諸􅁏者求之即愈不爾遂化為白鴿飛去或即虫出利人皆神而畏之嘗怒一僧遇野外作法叱之僧足如植手亦不䏻舉恣行鞭箠僧宻訟扵官命賊曹擒捕先沃以犬􅇾之血術無所施獄具遂斬于市㓂莱公㓂忠愍􅀄登第授大理評事知歸州巴東縣時唐郎中渭方爲郡夕夢有告云宰相至唐思之不聞有宰相出鎮者晨興視亊而􅆠吏報㓂廷評入界唐公驚愕出郡迓勞見其風神秀􅊆便以公輔待之仍出諸子羅拜唐新􅅚韀靮致㕔之左㓂旣歸其子拯白其父曰適者㓂屢目此宜即送之㓂果詢牙校何人知我欲此遂對以十四秀才旣而力爲延譽拯於孫漢公牓等甲成名魏進士建州進士魏某者冨有詞學履行温愍家亦頗豐天聖中屢冠郷書旣預計偕夢一衣緋衣人命徒執之棄市始謂必捷科苐旣而不利於春闈凢三舉皆然後歸卿閭有鄰里少年對語不遜因掌之即仆地死警卒捕送于官時裴郎中守是郡聞其學行為衆所丨推欲骫法脫之闔郡官吏亦為之言而魏白郡守曰某殺人償死軄也安敢仰累明公某三預薦書必夢緋衣人命徒執赴市就刑今明公姓裴乃緋衣也某邂逅一掌致人於死市死乃前定也􅀅刑一郡士庻無不為之嗟惜管師復言徳州民徳州徳平縣民某氏者父子數人耕田甚力家頗豐厚其弟素貧傭以養母兄未嘗有甘旨之助也慶暦中新搆瓦室三楹所居前後植栁數百株枝如拱把一夕大雷電野又數頭相逐繞其居折柳盡髠牙擊屋瓦明日視之無一瓦全者泥淖中足迹長二尺餘柳棓悉長三四尺皮盡剥瑩滑如削逺近居民悉取而蔵之予嘗親至平原人􅀃如此亦見其􅀁折柳枝括異志卷苐八
