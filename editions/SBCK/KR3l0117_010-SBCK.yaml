front:
  text: 括異志卷苐十
  hash: sha256:099b588aa6b065ac4407c4d0f54db2d6eb031a599c9e44beb0d02796dc1e364a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0117_SBCK_010-1a}
body:
  text: 襄國張師正繤鍾離發運鍾離瑾開寳間宰江州之徳化明年􅀅以女歸許氏居一曰諭其胥魁俾市婢以送女翌日胥與老嫗引一女子来問其何許人嫗曰撫之臨川人也幻䘮其親外氏肓之女受嫗戒亦不敢有他言君視事少間歸遇于屏是女流涕有戚容且疑其家叱罵詰曰不然某之父昔曽令是邑不幸與母俱䘮無親戚以為依時方五歳育於胥家十年矣且􅀅為己女今明府欲得媵妾胥與嫗以某應命適見明丨府視事追感吾父不􅁴涕零君大驚呼胥嫗以審如女言誡家人易其衣食如己所生以書抵許氏告緩期姑􅀅輟吾女之資以嫁焉許亦惻然復曰君侯獨䏻抑己女而㧞人之􅀌女予固有季子􅂅得以為婦安事盛飾哉卒以二女歸許氏乆之君夢一緑衣丈夫造庭拜而謝曰不圗賤息辱賜於君然得請於帝􅂅奉十任有土官故来致命後果歴十郡太守終於江淮發運使今鍾離氏有仕籍於朝常十餘獨出君之後故世為肥之冠族若許之名爵父老已失其􅀓嗚呼二君之用心非有求於世者特發諸至仁耳彼附貴而親靦然自以為得獨何人哉施報之事儒者蓋鮮言若蛟龍断虵杜回結草千古豈苟傳亦有以警勸云蔡侍禁蔡侍禁者故叅知政事文忠公之近属也景祐中常為京城西廵檢一日冠帯坐㕔事有緑衣蒼頭展刺云郎君奉謁旋見一少年状貌如十五六人衣淺黄衫玉帯紗㡌升階拜伏自稱郎君云前生與兄爲昆弟固請納拜蔡知其異不得已受其禮與之偶坐凝定神思拭目熟視之曰郎君必天地間貴神也何故惠然相過曰先居安上門譙三十年今期滿爲皇城司主者所遣故詣兄求一居止之所蔡曰某之􅇬宇湫隘豈堪郎君之䖏也即詣西廡下貯蒿秸之室曰乞糞除之􅀘隟封户得此足矣乃辤去蔡亦僶俛令從者㓗其室而扃鎖焉少时有虹梁自東南抵室門而止驢駕槖駝􅀒載巨槖者罔知其數復有金飾犢車垂珠簾張青盖者數十乗又有衣錦􅂁属槖鞬而􅀐者執撾而趋者左右前後亦數千人有伶人百餘衣紫緋緑􅂁奏樂前導郎君者乗馬按轡徐行其後又有臂鷹隼率獵犬洎四夷之人數百偕入於室中大抵􅁼車駕之儀仗他人弗之見也俄頃郎君復至叙謝再三幸得居此必無􅁝毫奉擾苟有㐫吉謹當奉報但勿令家人穴壁􅀼覘或要相覿冝焚香宻啓即至矣言訖不見蔡氏舉族大恐怖雖白晝不敢正視其室月餘寂無他怪間聞合樂聲如聞風􅀓自逺而至者自此差不懼蔡之細君由隟窺之見郎君者乗歩輦擁􅁎侍數百皆有殊色樓觀壮麗池館䆳袤若宫室然蔡有男卒已十餘年亦侍其側因燔香己吿郎君即至曰嫂何爲者對以求見亡男曰嫂子在郎君䖏甚樂無用見恐因驚而他適則有所苦􅈤告以母子之情呼出母見即大慟急就之遂㓕去嘆曰果驚去矣又數月遇蔡誕辰贄紈素數疋以爲夀舉視之若煙綃霧縠又如以蛛􅁝組織而成固非女工之所䏻杼軸也逮半歳来告曰兄已授明越巡檢明日宣下今先兄徃彼擇閴室而上焉揚子江神相與素善恐知是親戚故起風濤相戯不須憚也言訖即不見虹梁自室門而起南望無際輜重儀衛如来時翌日果徙明越廵檢􅀅至任一日郎君前方丈悉水陸珍品顧蔡曰非敢故為異味有悋於兄恐不相益耳到任又半年一旦来見曰與兄縁數已盡從此辤矣復由虹梁而去竟不知所適蔡族亦無他咎故客省張公亢守早凉之日􅀃斯事公亦有傳白􅂡翁嘉祐二年大理寺丞常洵為荆州潜江縣尉因徼廵至徑頭市路次草中有二女子年十三四祼形如丐者傴僂出馬前云是黄八娘家女奴来投官乞命詰之一婢云媪怒我㗖殘􅳨側里切數臠鞭笞百餘又以火箸遍灼我身一婢云我作勞少息不􅁴媪来怒我不起懸我足扵梁以刀割我尻􅁏悉禠去衣􅃭内空囷中不食已三日矣常問何以得来云適有白􅂡翁至囷前呼某䓁令躍出某云饑憊而囷且深不可踰又曰但躍不􅁴隨聲而出乃引至官道云立此少選有邑官来可愬以脱常至縣逮黄媪詰之一皆承㐲即送府時魏侍郎瓘尹荆南劾治具欵贖金而釋之媪今尚在其悍戾殘忍真狼虺然嘗適數夫或凌虐而致死或恐讋而仳􅍣前此婢媵潜􅀍􅆷害者數人毎隂晦則厲􅄦呼嘯所居之前後媪叱之即泥然噫白􅂡翁豈非神靈乎指導二婢復生可謂明且仁矣向之􅀍害者茹歎衘恨於􅁳漠中翁宜白之真官以直其冤易為力矣而令幽滯扵黄媪之室豈向􅀁殺者當死􅁘不然㐫􅁀之物􅄦神亦憚之也不可致詰矣斯事常洵自云韓元卿韓元卿泗州人也景祐五年苐進士皇祐中爲陜州推官監司俾鞠獄于武昌亊訖歸夷陵至荆州黄潭驛忽持刀自剄喉雖断而未死祖擇之時爲荆湖北提刑韓之同年進士也即視之韓不䏻語但舉手如索紙筆状因授之書云􅂍濫分明罪冝䖏斬乃棄筆於地祖命取桑根線縫其創自以手禠去翌日遂卒先是元卿調于京師紿稱無婦娶冨室之女資送良厚洎挈之到任則故妻在焉有男女數人矣冨人之女欲以書訴於家則隄防甚宻無由而逹歳餘悒抑而卒又不敢權厝于外但褁以䄄席􅄟于􅇬宇之隟地韓旣死方具柩而歛焉􅂍濫之誅豈非此􅁘李敏李敏嘗爲兖州奉符縣主簿㑹岳廟炳霛公殿歳乆再加營葺命敏督其役或曰宜先具公裳再拜啓其事於神李不應遂徹瓦未半黒雲滿殿庭風雹大作李始懼披簡拜階下仰視神座帳上有黄龍長數丈震霆數聲穿屋而去凡損稼百餘里炳靈公自後唐明宗􅃪醫僧之語遂贈官立祠余謂龍蟄于神帳上因徹瓦而驚隨風雷徙去未必神之靈變也向少卿宗道云樂平港鼉潭州樂平橋港乃湘之支流􅀓有鼉􅀎變怪食人歳有溺死者天聖中市民李姓者弟溺死不得屍以為鼉之食也李民痛切無方以復其冤因刺掌血濡墨作章夜醮奏而焚之祈逹扵帝是夜夢吏若道士􅀞天神之從官者駈民以行乆之至一䖏深嚴虚㓗若大府􅇬而屏之外有數吏以鐡索縶一物長數丈如龍而一角目光如電甚可畏吏指告民曰爾􅀅與此共見也民方悟為鼍妖已而俱入立庭下遥視殿上若有人物徃来而不辨其詳有頃一人下殿呼曰江鼉肆􅁀枉害平人决鐡杖一百䖏死李某不合以掌血腥穢上瀆高真冝付王碩决脊杖十五遂俱駈出民􅁴而歴歴誌之常􅅥息寅畏懼罹罪罟杜門不預外事後十餘年侍衘史王碩知潭州民坐遺火延焼一坊伏罪竟如所夢得之長沙僧寳珪云遵道者僧令遵陜州人也多智數善附麗權􅀔天聖中出入劉皇城家因而名聞宫掖荘獻賜與巨萬於陜州造一寺俻極壮麗凢用錢千餘萬緡自安業南街乗馬而西呼僕取墜䇿時有瞽者坐茶肆前仰而言曰僧豪也遵異之過百許步下馬復来揖之未已即曰豈非墜䇿之僧乎遵曰然復曰若之聲名嘗達天聽有之乎僧曰有之因問􅀅来之事良乆曰自此十五年歳在丙戌當有大禍宜杜門避之不爾免死為幸僧不懌而起旣歸陜具以瞽者之言吿其徒咸曰遵道者戒行素嚴􅍔何由而至以謂不然至慶曆六年傳岩淵馬道人􅀅圗不􅁤陜有市民亦預其謀民􅀅自陳于官宻詣僧謀之僧曰若自首于郡不過免死而已我有主人在京師地連但持我書詣之因其言以逹朝廷豈止免罪當􅀗重賞民從之行至洛黨中二卒吿變籍有民名捕得􅀞道􅀁以然之状及出遵書時薛紳守陜郊大怒遂黥遵為武昌城卒董中正董中正宿州髙資户也邢州僧慈演者寓外宿有年矣畜鏹千餘萬􅀉於董室其後僧病且死錢遂没于董氏治平三年春中正病亟大呼曰邢州不須呵詆待我還爾錢數日卒其長男為符離衙校旣殯父即日得病信宿遂恍惚云邢州就我父索錢有人監督甚急乞少緩詎敢詆讕也旣而又死宿有樂人張遂自岱岳囬出徐州界張弓手店見衙校者躍馬而来問何之曰大人有少緡錢為劵約不明在兖州對辨暫徃省問若今歸􅁘可至我家言我甚安道中不暇作書也張至宿詣董宅􅀅道其事方知董之父子皆已死矣四㑹縣尉吕邈云同州村民同州馮翊村民寳元中有牛生一兒旋失之民家有老翁八十餘夜則来與老翁共語人皆聞之忽謂公曰我昨日徃延州與羌賊交􅀾南兵失利劉石二大􅀅皆為賊擒鄰里相傳喧然聞於邑大夫方􅀅逮翁詰之後三日敗問果至自兹州縣屢有呼問兒謝翁曰我住此令翁家不寜遂去不復来正徳十年歳次乙亥仲春癸丑日虞山逸民俞洪重録畢括異志卷苐十终
